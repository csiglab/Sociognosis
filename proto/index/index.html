<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Space Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #0a0c14;
            --bg-surface: #12151f;
            --bg-card: #1a1e2a;
            --bg-elevated: #242938;
            --text-primary: #f4f7fc;
            --text-secondary: #b0b8c8;
            --text-muted: #7a8599;
            --accent-gold: #e0b860;
            --accent-cyan: #60f0e0;
            --accent-rose: #f07080;
            --border-subtle: rgba(255, 255, 255, 0.12);
            --border-medium: rgba(255, 255, 255, 0.2);
            --glow-cyan: 0 0 25px rgba(96, 240, 224, 0.25);
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 5px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            letter-spacing: 0.015em;
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: 1fr;
            height: 100vh;
            overflow: hidden;
            transition: grid-template-columns .5s cubic-bezier(.22, 1, .36, 1);
        }

        body.sidebar-collapsed { grid-template-columns: 0 1fr; }

        main.canvas-area {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 1px, rgba(255, 255, 255, 0.05) 0.5px, transparent 0.5px),
                radial-gradient(ellipse at 50% 40%, #141622 0%, var(--bg-void) 75%),
                radial-gradient(ellipse at 25% 65%, rgba(96, 240, 224, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 25%, rgba(224, 184, 96, 0.03) 0%, transparent 55%);
            background-size: 4px 4px, 100% 100%, 100% 100%, 100% 100%;
        }

        main.canvas-area::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(10, 12, 20, 0.6) 100%);
            z-index: 1;
        }

        canvas#graph-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
        }

        canvas#graph-canvas:active { cursor: grabbing; }
        canvas#graph-canvas.locked { cursor: default; }

        .sidebar-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(16, 18, 28, 0.9);
            backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all .3s ease;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        .sidebar-toggle:hover {
            color: var(--accent-cyan);
            border-color: rgba(96, 240, 224, 0.4);
            box-shadow: var(--glow-cyan), 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        aside.toolbox {
            background:
                radial-gradient(ellipse 60% 30% at 50% 0%, rgba(224, 184, 96, 0.06) 0%, transparent 100%),
                linear-gradient(180deg, #14120e 0%, #100e0c 100%);
            border-right: 1px solid rgba(224, 184, 96, 0.12);
            padding: 32px 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            transition: all .5s cubic-bezier(.22, 1, .36, 1);
        }

        body.sidebar-collapsed aside.toolbox {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-100%);
            overflow: hidden;
        }

        aside.toolbox::-webkit-scrollbar { width: 4px; }
        aside.toolbox::-webkit-scrollbar-track { background: transparent; }
        aside.toolbox::-webkit-scrollbar-thumb { background: rgba(224, 184, 96, 0.15); border-radius: 3px; }

        aside.toolbox::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 8%, rgba(224, 184, 96, 0.5) 50%, transparent 92%);
            z-index: 2;
        }

        .sb-header { padding-bottom: 26px; position: relative; z-index: 1; }

        .sb-eyebrow {
            font-family: var(--font-display);
            font-size: .72rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(224, 184, 96, 0.7);
            letter-spacing: .06em;
            margin-bottom: 12px;
            display: block;
        }

        .sb-title {
            font-family: var(--font-display);
            font-size: 2.1rem;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 300;
            line-height: 1.08;
            letter-spacing: .005em;
        }

        .sb-title::after {
            content: '';
            display: block;
            width: 22px;
            height: 1px;
            margin-top: 14px;
            border-radius: 1px;
            background: var(--accent-gold);
            opacity: .7;
        }

        .sb-subtitle {
            font-family: var(--font-display);
            font-size: .8rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.55;
            font-weight: 300;
            font-style: italic;
            letter-spacing: .003em;
            margin-top: 2px;
        }

        .sb-search { position: relative; z-index: 1; padding-bottom: 2px; }
        .search-wrap { position: relative; }

        .search-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(224, 184, 96, 0.15);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: .76rem;
            padding: 10px 32px 10px 36px;
            outline: 0;
            transition: border-color .3s ease, box-shadow .3s ease;
            border-radius: 7px;
            letter-spacing: .005em;
        }

        .search-box::placeholder { color: rgba(255, 255, 255, 0.4); font-weight: 300; font-style: italic; }
        .search-box:focus { border-color: rgba(224, 184, 96, 0.5); box-shadow: 0 0 0 3px rgba(224, 184, 96, 0.1); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.35);
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 15px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all .2s;
            opacity: 0;
            pointer-events: none;
        }
        .search-clear.visible { opacity: .6; pointer-events: auto; }
        .search-clear:hover { opacity: 1; color: var(--accent-gold); }

        .sb-gold-line {
            height: 1px;
            margin: 8px 0 0;
            background: linear-gradient(90deg, transparent, rgba(224, 184, 96, 0.25), transparent);
            position: relative;
            z-index: 1;
        }

        .sb-controls { padding-top: 20px; position: relative; z-index: 1; flex: 1; }
        
        .sb-group { position: relative; }
        .sb-group + .sb-group {
            padding-top: 16px;
            margin-top: 16px;
            border-top: 1px solid rgba(224, 184, 96, 0.1);
        }

        .sb-group-label {
            font-family: var(--font-display);
            font-size: .7rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(224, 184, 96, 0.6);
            letter-spacing: .04em;
            margin-bottom: 9px;
            display: block;
        }

        .time-section {
            background: linear-gradient(180deg, rgba(224, 184, 96, 0.04) 0%, transparent 100%);
            border: 1px solid rgba(224, 184, 96, 0.12);
            border-radius: 8px;
            padding: 13px 15px;
            position: relative;
            overflow: hidden;
        }

        .time-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(224, 184, 96, 0.25), transparent);
        }

        .time-range {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: .7rem;
            color: rgba(224, 184, 96, 0.9);
            font-weight: 400;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: .01em;
        }

        .time-slider-wrap { position: relative; height: 16px; margin-bottom: 6px; }

        .time-track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-50%);
            border-radius: 1px;
        }

        .time-fill {
            position: absolute;
            top: 50%;
            height: 1px;
            background: var(--accent-gold);
            transform: translateY(-50%);
            border-radius: 1px;
            pointer-events: none;
            transition: left .05s, width .05s;
            opacity: .6;
        }
        .time-fill.active { opacity: 1; box-shadow: 0 0 12px rgba(224, 184, 96, 0.25); }

        .time-slider-wrap input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            margin: 0;
            outline: none;
            pointer-events: none;
            z-index: 2;
        }

        .time-slider-wrap input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            pointer-events: all;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--accent-gold);
            border: none;
            cursor: ew-resize;
            box-shadow: 0 0 10px rgba(224, 184, 96, 0.5);
            transition: box-shadow .2s, transform .15s;
        }
        
        .time-stats {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-mono);
            font-size: .48rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }
        .time-stats .ts-count { color: var(--accent-gold); font-weight: 500; font-size: .62rem; }

        .toggle-group { display: flex; flex-direction: column; gap: 1px; }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            font-size: .68rem;
            color: var(--text-secondary);
            transition: all .2s ease;
            padding: 5px 8px;
            border-radius: 5px;
            border: 1px solid transparent;
        }

        .toggle-item:hover { color: var(--text-primary); background: rgba(224, 184, 96, 0.05); }
        .toggle-item input { display: none; }

        .checkmark {
            width: 14px;
            height: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0;
            border-radius: 3px;
        }

        .toggle-item input:checked ~ .checkmark {
            border-color: rgba(224, 184, 96, 0.7);
            background: rgba(224, 184, 96, 0.15);
        }

        .toggle-item input:checked ~ .checkmark::after {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-gold);
            opacity: 1;
        }
        
        .toggle-item.disabled { opacity: .2; pointer-events: none; }
        .cat-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

        /* Search Dropdown */
        .search-dropdown {
            position: fixed;
            z-index: 500;
            background: rgba(12, 11, 9, 0.98);
            backdrop-filter: blur(36px) saturate(1.15);
            border: 1px solid rgba(224, 184, 96, 0.15);
            border-radius: 10px;
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.8);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height .35s cubic-bezier(.22, 1, .36, 1), opacity .2s ease;
            pointer-events: none;
            width: 360px;
        }
        .search-dropdown.open { max-height: 440px; opacity: 1; pointer-events: auto; }

        .search-dropdown-inner {
            max-height: 380px;
            overflow-y: auto;
            padding: 4px 5px;
        }

        .search-result {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 9px;
            cursor: pointer;
            transition: all .15s ease;
            border-radius: 6px;
            border: 1px solid transparent;
        }
        .search-result:hover { background: rgba(224, 184, 96, 0.05); border-color: rgba(224, 184, 96, 0.15); }
        .search-result.active { background: rgba(224, 184, 96, 0.12); border-color: rgba(224, 184, 96, 0.35); }

        .sr-body { flex: 1; min-width: 0; padding-top: 1px; }
        .sr-name {
            font-family: var(--font-display);
            font-size: .8rem;
            color: var(--text-primary);
            font-style: italic;
        }
        .sr-desc {
            font-size: .56rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(14, 16, 26, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 2px solid var(--accent-cyan);
            padding: 14px 16px;
            width: 270px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
            border-radius: var(--radius-md);
        }

        .tt-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 3px;
            color: var(--text-primary);
        }
        .tt-desc { font-size: .72rem; color: var(--text-secondary); line-height: 1.55; }
        
        /* Loading */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-void);
            z-index: 200;
            transition: opacity .8s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-dots { display: flex; gap: 8px; }
        .loader-dots span {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent-cyan);
            opacity: .25;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: .16s; }
        .loader-dots span:nth-child(3) { animation-delay: .32s; }
        @keyframes dotPulse { 0%, 80%, 100% { opacity: .25; transform: scale(.8); } 40% { opacity: 1; transform: scale(1.3); } }
        .loader-text { font-family: var(--font-mono); font-size: .6rem; color: var(--text-secondary); margin-top: 24px; text-transform: uppercase; letter-spacing: .25em; }

    </style>
</head>

<body>
    <aside class="toolbox" id="sidebar">
        <div class="sb-header">
            <span class="sb-eyebrow">Product Space Atlas</span>
            <h2 class="sb-title">Space Explorer</h2>
            <p class="sb-subtitle">Mapping the architecture of production capabilities.</p>
        </div>

        <!-- Search Nodes -->
        <div class="sb-search">
            <div class="search-wrap">
                <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                <input type="text" class="search-box" id="search-input" placeholder="Search nodes..." autocomplete="off">
                <button class="search-clear" id="search-clear">&times;</button>
            </div>
        </div>

        <div class="sb-gold-line"></div>

        <div class="sb-controls">
            
            <!-- Temporal Control -->
            <div class="sb-group">
                <span class="sb-group-label">Temporal Scope</span>
                <div class="time-section">
                    <div class="time-range">
                        <span id="time-min-label">&mdash;</span>
                        <span id="time-max-label">&mdash;</span>
                    </div>
                    <div class="time-slider-wrap">
                        <div class="time-track"></div>
                        <div class="time-fill" id="time-fill"></div>
                        <input type="range" id="time-min" min="0" max="1000" value="0">
                        <input type="range" id="time-max" min="0" max="1000" value="1000">
                    </div>
                    <div class="time-stats">
                        <span class="ts-count" id="time-visible-count">0</span>
                        <span>of <span id="time-total-count">0</span> nodes</span>
                    </div>
                </div>
            </div>

            <!-- Visual Lenses -->
            <div class="sb-group">
                <span class="sb-group-label">Visual Lenses</span>
                <div class="toggle-group" id="lens-controls">
                    <label class="toggle-item"><input type="checkbox" id="lens-hulls" checked><span class="checkmark"></span>Category Hulls</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-heatmap"><span class="checkmark"></span>Constraint Heatmap</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-centrality"><span class="checkmark"></span>Centrality Sizing</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-confidence-color"><span class="checkmark"></span>Confidence Gradient</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-flow" checked><span class="checkmark"></span>Luminous Flow</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-observability"><span class="checkmark"></span>Confidence Ghosting</label>
                </div>
            </div>

        </div>
    </aside>

    <main class="canvas-area">
        <button class="sidebar-toggle" id="sidebar-toggle-btn">&#9776;</button>
        <canvas id="graph-canvas"></canvas>
        <div id="tooltip">
            <div class="tt-title" id="tt-title"></div>
            <div class="tt-desc" id="tt-desc"></div>
        </div>
    </main>

    <div class="search-dropdown" id="search-dropdown">
        <div class="search-dropdown-inner" id="search-dropdown-inner"></div>
    </div>

    <div id="loading-overlay">
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <div class="loader-text" id="loader-msg">Initializing graph</div>
    </div>

    <script>
        /* ═══════ UTILITIES ═══════ */
        function hexToRGBA(h,a){if(!h||h.startsWith('rgb'))return h;var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')'}
        function friendlyLabel(k){return k.replace(/([A-Z])/g,' $1').replace(/_/g,' ').replace(/^./,function(s){return s.toUpperCase()}).trim()}
        function shortLabel(k){var m={'ProductionProcess':'Process','ProductionSystem':'System','ValueChainStage':'Value Chain'};return m[k]||friendlyLabel(k)}
        function confidenceColor(s){var r,g,b;if(s<=0.5){var t=s/0.5;r=224;g=Math.round(96+128*t);b=Math.round(112+104*t)}else{var t2=(s-0.5)/0.5;r=Math.round(224-152*t2);g=Math.round(224+8*t2);b=216}return'rgb('+r+','+g+','+b+')'}
        function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
        function isFiniteNum(v){return typeof v==='number'&&isFinite(v)}

        /* ═══════ CONSTANTS & STATE ═══════ */
        var CP=['#FF9F43','#48e8d8','#7EC8E8','#3CC0A0','#80C090','#5DE8C8','#70E0B8','#E8E8E8','#C0A060','#C03050'];
        var FP=['#48e8d8','#C9A44e','#7BE0A0','#E06070','#FFE066','#8B7BF0'];
        var SC=['circle','triangle','square','diamond','hexagon'];
        
        var CLL={
            'Product':'Product Space','ProductCategory':'Product Space',
            'ProductionProcess':'Process Space','ProductionSystem':'Process Space',
            'Technique':'Capability Space','Capability':'Capability Space',
            'Resource':'Infrastructure Space','Infrastructure':'Infrastructure Space'
        };
        var LPC={'Strategic Space':'#C9A44e','Capability Space':'#48e8d8','Process Space':'#7BE0A0','Product Space':'#45B7D1','Infrastructure Space':'#E06070'};
        
        var CL=[], CC={}, CS={}, LL=[], LC={};
        var nodes=[], gE=[], nM={};
        var alpha=1;
        var cam={x:0,y:0,z:1}, camTgt=null;
        var hovN=null, dragN=null;
        var isPan=false, panS={x:0,y:0};
        var W=0, H=0;
        var aLayers = new Set();
        var tR={min:-Infinity,max:Infinity}, tRF={min:0,max:0};
        var fc=0, lt=performance.now(), fps=0;

        var canvas=document.getElementById('graph-canvas'),ctx=canvas.getContext('2d');
        var dLoaded=false;

        /* ═══════ SIMULATION CONSTANTS ═══════ */
        var REP=280,SL=110,SS=0.012,CC2=0.005,CG=0.008,AS=0.006,DR=0.88;

        /* ═══════ AMBIENT & DUST ═══════ */
        var ambBlobs=[], dustParts=[];
        function initAmb(){for(var i=0;i<5;i++)ambBlobs.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*280+140,vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.08,color:CP[i%CP.length],opacity:Math.random()*0.022+0.008});}
        function drawAmb(){ambBlobs.forEach(function(b){b.x+=b.vx;b.y+=b.vy;if(b.x<-b.r)b.x=W+b.r;if(b.x>W+b.r)b.x=-b.r;if(b.y<-b.r)b.y=H+b.r;if(b.y>H+b.r)b.y=-b.r;var grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);grd.addColorStop(0,hexToRGBA(b.color,b.opacity));grd.addColorStop(1,hexToRGBA(b.color,0));ctx.fillStyle=grd;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()});}
        function initDust(){for(var i=0;i<35;i++)dustParts.push({x:Math.random()*2000,y:Math.random()*2000,size:Math.random()*1.2+0.3,speed:Math.random()*0.2+0.04,angle:Math.random()*Math.PI*2,opacity:Math.random()*0.12+0.025,drift:Math.random()*0.003-0.0015});}
        function drawDust(){dustParts.forEach(function(p){p.x+=Math.cos(p.angle)*p.speed;p.y+=Math.sin(p.angle)*p.speed;p.angle+=p.drift;if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;if(p.y<-10)p.y=H+10;if(p.y>H+10)p.y=-10;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=hexToRGBA('#8892b0',p.opacity);ctx.fill()});}

        /* ═══════ VIEW HELPERS ═══════ */
        function sCV(){var r=canvas.parentElement.getBoundingClientRect();W=r.width;H=r.height;canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
        function resize(){sCV();if(dLoaded)fCam();}
        function fCam(){var v=nodes.filter(function(n){return n.visible});if(!v.length)return;var x1=Infinity,x2=-Infinity,y1=Infinity,y2=-Infinity;v.forEach(function(n){if(n.x<x1)x1=n.x;if(n.x>x2)x2=n.x;if(n.y<y1)y1=n.y;if(n.y>y2)y2=n.y});if(x1===Infinity)return;var p=120,gw=x2-x1+p*2,gh=y2-y1+p*2,z=Math.min(W/gw,H/gh,1.2);cam.z=z;cam.x=W/2-((x1+x2)/2)*z;cam.y=H/2-((y1+y2)/2)*z;camTgt=null;}
        function pTN(nd){if(!nd)return;var tz=Math.max(cam.z,1.2);camTgt={x:W/2-nd.x*tz,y:H/2-nd.y*tz,z:tz};}
        function uCP(){if(!camTgt)return;var dx=camTgt.x-cam.x,dy=camTgt.y-cam.y,dz=camTgt.z-cam.z;if(Math.abs(dx)<.3&&Math.abs(dy)<.3&&Math.abs(dz)<.001){cam.x=camTgt.x;cam.y=camTgt.y;cam.z=camTgt.z;camTgt=null;return}cam.x+=dx*.09;cam.y+=dy*.09;cam.z+=dz*.09;}
        function w2s(wx,wy){return{x:wx*cam.z+cam.x,y:wy*cam.z+cam.y}}
        function s2w(sx,sy){return{x:(sx-cam.x)/cam.z,y:(sy-cam.y)/cam.z}}
        
        /* ═══════ FORCE SIMULATION ═══════ */
        function simTick(){
            var vis=nodes.filter(function(n){return n.visible});if(!vis.length)return;
            alpha*=0.998;if(alpha<0.003)alpha=0.003;
            var i,j,n=vis.length;
            // Repulsion
            for(i=0;i<n;i++){var a=vis[i];if(a===dragN)continue;var fx=0,fy=0;
                for(j=0;j<n;j++){if(i===j)continue;var b=vis[j];var dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;if(d2<1)d2=1;var d=Math.sqrt(d2);if(d<REP){var f=(REP-d)/d*SS*alpha;fx+=dx*f;fy+=dy*f}}
                a.vx=(a.vx||0)+fx;a.vy=(a.vy||0)+fy;
            }
            // Category Center Gravity
            var cxs={},cys={},ccs={};
            vis.forEach(function(nd){var c=nd.category;if(!cxs[c]){cxs[c]=0;cys[c]=0;ccs[c]=0}cxs[c]+=nd.x;cys[c]+=nd.y;ccs[c]++});
            vis.forEach(function(nd){var c=nd.category,cnt=Math.max(1,ccs[c]||1);var ccx=cxs[c]/cnt,ccy=cys[c]/cnt;nd.vx=(nd.vx||0)+(ccx-nd.x)*CC2*alpha;nd.vy=(nd.vy||0)+(ccy-nd.y)*CC2*alpha;nd.vx*=CG;nd.vy*=CG;});
            // Edges
            gE.forEach(function(e){if(!e.visible)return;var s=nM[e.source],t=nM[e.target];if(!s||!t)return;var dx=t.x-s.x,dy=t.y-s.y,d=Math.sqrt(dx*dx+dy*dy);if(d<1)return;var f=(d-SL)/d*AS*alpha;
                if(s!==dragN){s.vx=(s.vx||0)+dx*f;s.vy=(s.vy||0)+dy*f}
                if(t!==dragN){t.vx=(t.vx||0)-dx*f;t.vy=(t.vy||0)-dy*f}
            });
            // Apply Velocity
            vis.forEach(function(nd){if(nd===dragN)return;nd.vx*=DR;nd.vy*=DR;var spd=Math.sqrt(nd.vx*nd.vx+nd.vy*nd.vy);if(spd>50){nd.vx=nd.vx/spd*50;nd.vy=nd.vy/spd*50}nd.x+=nd.vx;nd.y+=nd.vy;});
        }

        /* ═══════ DRAWING ═══════ */
        function drawEdges(){
            var showFlow=document.getElementById('lens-flow').checked;
            gE.forEach(function(e){
                if(!e.visible)return;var s=nM[e.source],t=nM[e.target];if(!s||!t)return;
                var sp=w2s(s.x,s.y),tp=w2s(t.x,t.y);
                var isHov=hovN&&(hovN.id===e.source||hovN.id===e.target);
                var baseA=isHov?0.35:0.08;
                ctx.strokeStyle=hexToRGBA('#48e8d8',baseA);ctx.lineWidth=isHov?1.2:0.6;
                ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y);ctx.stroke();
            })
        }

        function drawHulls(){
            if(!document.getElementById('lens-hulls').checked)return;
            var catC={};nodes.forEach(function(n){if(n.visible){if(!catC[n.category])catC[n.category]=[];catC[n.category].push(n)}});
            Object.keys(catC).forEach(function(cat){
                var pts=catC[cat];if(pts.length<3)return;
                var sPts=pts.map(function(p){return w2s(p.x,p.y)});
                var cx=0,cy=0;sPts.forEach(function(p){cx+=p.x;cy+=p.y});cx/=sPts.length;cy/=sPts.length;
                sPts.sort(function(a,b){return Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx)});
                ctx.beginPath();ctx.moveTo(sPts[0].x,sPts[0].y);
                for(var i=1;i<sPts.length;i++)ctx.lineTo(sPts[i].x,sPts[i].y);ctx.closePath();
                var hullCol=CC[cat]||'#888';
                var hgrd=ctx.createRadialGradient(cx,cy,0,cx,cy,200);
                hgrd.addColorStop(0,hexToRGBA(hullCol,0.04));hgrd.addColorStop(1,hexToRGBA(hullCol,0));
                ctx.fillStyle=hgrd;ctx.fill();ctx.strokeStyle=hexToRGBA(hullCol,0.12);ctx.lineWidth=1;ctx.stroke();
            })
        }

        function drawNodes(){
            var showCent=document.getElementById('lens-centrality').checked;
            var showConfCol=document.getElementById('lens-confidence-color').checked;
            var showObs=document.getElementById('lens-observability').checked;
            var maxDeg=Math.max(1,nodes.reduce(function(a,n){return Math.max(a,n.degree)},0));

            nodes.forEach(function(nd){
                if(!nd.visible)return;var sp=w2s(nd.x,nd.y);
                var isHov=hovN&&hovN.id===nd.id;
                var baseR=showCent?(3.5+nd.degree*1.3):(4.5+nd.degree*0.55);
                var r=Math.max(2.5,baseR)*cam.z;r=Math.max(2,Math.min(r,24));
                if(isHov)r*=1.35;
                var col=showConfCol?confidenceColor(nd.confidence):(CC[nd.category]||'#888');
                var alpha2=1;
                if(showObs&&!(isHov)){var c=nd.confidence||0.7;if(c<0.4)alpha2=0.15;else if(c<0.65)alpha2=0.45}
                
                ctx.globalAlpha=alpha2;
                
                if(isHov){
                    var glowR=r+8;var gGrd=ctx.createRadialGradient(sp.x,sp.y,r*0.5,sp.x,sp.y,glowR);
                    gGrd.addColorStop(0,hexToRGBA('#ffffff',0.2));gGrd.addColorStop(1,hexToRGBA('#ffffff',0));
                    ctx.fillStyle=gGrd;ctx.beginPath();ctx.arc(sp.x,sp.y,glowR,0,Math.PI*2);ctx.fill();
                }
                
                var nGrd=ctx.createRadialGradient(sp.x-r*0.25,sp.y-r*0.25,0,sp.x,sp.y,r);
                nGrd.addColorStop(0,hexToRGBA(col,1));nGrd.addColorStop(1,hexToRGBA(col,0.75));
                ctx.fillStyle=nGrd;ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.fill();
                
                if(cam.z>0.55&&r>4){
                    ctx.font='500 '+Math.max(8,r*0.9)+'px Inter';ctx.textAlign='center';ctx.textBaseline='top';
                    ctx.fillStyle=hexToRGBA('#e0e4f0',alpha2*(isHov?0.92:0.7));
                    var lbl=nd.name||'';if(lbl.length>18)lbl=lbl.substring(0,16)+'…';
                    ctx.fillText(lbl,sp.x,sp.y+r+4);
                }
                ctx.globalAlpha=1;
            })
        }

        function render(){
            requestAnimationFrame(render);
            uCP();simTick();
            ctx.clearRect(0,0,W,H);
            drawAmb();drawDust();
            drawHulls();drawEdges();drawNodes();
        }

        /* ═══════ FILTERING ═══════ */
        function uFilt(){
            var vc=0;
            nodes.forEach(function(n){
                // Layer filtering logic removed, defaulting to true
                var inLay = true; 
                var inTime=isFiniteNum(n.year)?n.year>=tR.min&&n.year<=tR.max:true;
                n.visible=inLay&&inTime;
                if(n.visible)vc++;
            });
            gE.forEach(function(e){
                var s=nM[e.source],t=nM[e.target];
                e.visible=s&&t&&s.visible&&t.visible;
            });
            document.getElementById('time-visible-count').textContent=vc;
        }

        /* ═══════ SCHEMA & DATA ═══════ */
        function deriveSchema(data){
            var cs=new Set(),ls=new Set();
            data.forEach(function(r){
                if(r.category)cs.add(r.category);
                var layer=CLL[r.category];
                if(layer)ls.add(layer);
            });
            CL=Array.from(cs).sort();LL=Array.from(ls).sort();
            CL.forEach(function(c,i){CC[c]=CP[i%CP.length];CS[c]=SC[i%SC.length]});
            LL.forEach(function(l){LC[l]=LPC[l]||'#888'});
            aLayers=new Set(LL);
        }

        function initGraph(data){
            deriveSchema(data);nM={};nodes=[];gE=[];
            var minY=Infinity,maxY=-Infinity,degC={};

            data.forEach(function(r){
                if(!r.id)return;
                var id=r.id.replace(/\s+/g,'_');
                var yr=null;
                if(r.historicalContext&&r.historicalContext.chronology){
                    var years=r.historicalContext.chronology.map(function(c){return c.year}).filter(isFiniteNum);
                    if(years.length)yr=Math.min.apply(null,years);
                }
                if(yr!==null&&yr<minY)minY=yr;if(yr!==null&&yr>maxY)maxY=yr;
                var layer=CLL[r.category]||'Strategic Space';
                var nd={
                    id:id,name:r.name||r.id,category:r.category,layer:layer,
                    description:r.description||'',
                    confidence:((r.metadata&&r.metadata.confidenceScore)||0.7),
                    degree:0, year:yr,
                    x:(Math.random()-.5)*800,y:(Math.random()-.5)*800,
                    vx:0,vy:0,visible:true,_raw:r
                };
                nodes.push(nd);nM[id]=nd;degC[id]=0;
            });

            data.forEach(function(r){
                if(!r.relationships)return;
                r.relationships.forEach(function(rel){
                    var sid=r.id.replace(/\s+/g,'_');
                    var tid=(rel.targetNodeId||'').replace(/\s+/g,'_');
                    if(!nM[sid]||!nM[tid])return;
                    gE.push({source:sid,target:tid,visible:true});
                    degC[sid]=(degC[sid]||0)+1;degC[tid]=(degC[tid]||0)+1;
                });
            });

            nodes.forEach(function(n){n.degree=degC[n.id]||0});
            tRF.min=minY===Infinity?0:minY;tRF.max=maxY===-Infinity?2025:maxY;
            tR.min=tRF.min;tR.max=tRF.max;
            
            document.getElementById('time-total-count').textContent=nodes.length;
            uTimeFill();
            // buildLayerToggles() removed
            uFilt();
            
            sCV();fCam();
            dLoaded=true;
            initAmb();initDust();
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        /* ═══════ UI CONTROLS ═══════ */
        // buildLayerToggles function removed

        function uTimeFill(){
            var mn=parseInt(document.getElementById('time-min').value);
            var mx=parseInt(document.getElementById('time-max').value);
            if(mn>mx){var tmp=mn;mn=mx;mx=tmp}
            var range=tRF.max-tRF.min;if(range<=0)range=1;
            tR.min=tRF.min+mn/1000*range;tR.max=tRF.min+mx/1000*range;
            
            var fill=document.getElementById('time-fill');
            fill.style.left=(mn/10)+'%';fill.style.width=((mx-mn)/10)+'%';
            document.getElementById('time-min-label').textContent=tR.min>0?'c. '+Math.round(tR.min):'—';
            document.getElementById('time-max-label').textContent=tR.max<Infinity?'c. '+Math.round(tR.max):'—';
        }
        
        function doSearch(q){
            var dd=document.getElementById('search-dropdown');
            var inner=document.getElementById('search-dropdown-inner');
            var inp=document.getElementById('search-input');
            var r=inp.getBoundingClientRect();
            dd.style.top=(r.bottom+4)+'px';dd.style.left=r.left+'px';dd.style.width=Math.max(300,r.width)+'px';

            if(!q){dd.classList.remove('open');return;}
            var res=nodes.filter(function(n){return n.name.toLowerCase().indexOf(q.toLowerCase())>=0}).slice(0,10);
            
            var html='';
            res.forEach(function(nd){
                html+='<div class="search-result" data-id="'+nd.id+'"><div class="sr-body"><span class="sr-name">'+nd.name+'</span><span class="sr-desc">'+(nd.description||'')+'</span></div></div>';
            });
            inner.innerHTML=html;
            dd.classList.add('open');
            
            inner.querySelectorAll('.search-result').forEach(function(el){
                el.addEventListener('click',function(){
                    var id=el.dataset.id;
                    var nd=nM[id];
                    if(nd){
                        pTN(nd);
                        hovN=nd; // keep it highlighted
                    }
                    dd.classList.remove('open');
                    document.getElementById('search-input').value='';
                    document.getElementById('search-clear').classList.remove('visible');
                });
            });
        }

        /* ═══════ EVENT LISTENERS ═══════ */
        canvas.addEventListener('mousedown',function(e){
            var r=canvas.getBoundingClientRect();var sx=e.clientX-r.left,sy=e.clientY-r.top;
            var nd=hitNode(sx,sy);
            if(nd){dragN=nd;canvas.classList.add('locked')} 
            else {isPan=true;panS={x:e.clientX-cam.x,y:e.clientY-cam.y};canvas.classList.add('locked')}
        });
        canvas.addEventListener('mousemove',function(e){
            var r=canvas.getBoundingClientRect();var sx=e.clientX-r.left,sy=e.clientY-r.top;
            if(dragN){var wp=s2w(sx,sy);dragN.x=wp.x;dragN.y=wp.y;dragN.vx=0;dragN.vy=0;return}
            if(isPan){cam.x=e.clientX-panS.x;cam.y=e.clientY-panS.y;camTgt=null;return}
            var nd=hitNode(sx,sy);
            if(nd!==hovN){hovN=nd;if(nd)showTT(nd,sx,sy);else hideTT()}
        });
        canvas.addEventListener('mouseup',function(){dragN=null;isPan=false;canvas.classList.remove('locked')});
        canvas.addEventListener('mouseleave',function(){hovN=null;hideTT();if(!dragN){isPan=false;canvas.classList.remove('locked')}});
        canvas.addEventListener('wheel',function(e){
            e.preventDefault();var r=canvas.getBoundingClientRect();var sx=e.clientX-r.left,sy=e.clientY-r.top;
            var wp=s2w(sx,sy);var f=e.deltaY>0?0.9:1.1;var nz=clamp(cam.z*f,0.05,8);
            cam.x=sx-wp.x*nz;cam.y=sy-wp.y*nz;cam.z=nz;camTgt=null;
        },{passive:false});

        function hitNode(sx,sy){
            var wp=s2w(sx,sy);var best=null,bestD=Infinity;
            nodes.forEach(function(n){if(!n.visible)return;var dx=n.x-wp.x,dy=n.y-wp.y,d2=dx*dx+dy*dy;var r=(4.5+n.degree*0.55)*1.8;if(d2<r*r&&d2<bestD){bestD=d2;best=n}});
            return best;
        }
        function showTT(nd,sx,sy){
            var tt=document.getElementById('tooltip');
            document.getElementById('tt-title').textContent=nd.name;
            document.getElementById('tt-desc').textContent=nd.description||'';
            tt.style.display='block';
            var tx=sx+16,ty=sy-10;
            if(tx+270>W)tx=sx-280;if(ty+100>H)ty=H-110;
            tt.style.left=tx+'px';tt.style.top=ty+'px';
        }
        function hideTT(){document.getElementById('tooltip').style.display='none'}

        document.getElementById('sidebar-toggle-btn').addEventListener('click',function(){document.body.classList.toggle('sidebar-collapsed');setTimeout(resize,550)});
        document.getElementById('time-min').addEventListener('input',function(){uTimeFill();uFilt()});
        document.getElementById('time-max').addEventListener('input',function(){uTimeFill();uFilt()});
        document.getElementById('search-input').addEventListener('input',function(){var q=this.value.trim();document.getElementById('search-clear').classList.toggle('visible',q.length>0);doSearch(q)});
        document.getElementById('search-clear').addEventListener('click',function(){document.getElementById('search-input').value='';this.classList.remove('visible');doSearch('')});

        /* ═══════ BOOT ═══════ */
        resize();render();window.addEventListener('resize',resize);
        
        var loaderMsg=document.getElementById('loader-msg');
        loaderMsg.textContent='Loading product space';
        fetch('../../docs/data/index/data.json')
            .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
            .then(function(d){
                loaderMsg.textContent='Building graph';
                var arr=Array.isArray(d)?d:(d.nodes||d.categories||[]);
                if(!arr.length)throw new Error('Empty dataset');
                setTimeout(function(){initGraph(arr)},60);
            })
            .catch(function(err){
                loaderMsg.innerHTML='<span class="loader-error">Failed to load data.<br>'+err.message+'</span>';
            });
    </script>
</body>
