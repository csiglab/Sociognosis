<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epistemic Space Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #0a0c14;
            --bg-surface: #12151f;
            --bg-card: #1a1e2a;
            --bg-elevated: #242938;
            --text-primary: #f4f7fc;
            --text-secondary: #b0b8c8;
            --text-muted: #7a8599;
            --accent-gold: #e0b860;
            --accent-cyan: #60f0e0;
            --accent-rose: #f07080;
            --border-subtle: rgba(255, 255, 255, 0.12);
            --border-medium: rgba(255, 255, 255, 0.2);
            --glow-cyan: 0 0 25px rgba(96, 240, 224, 0.25);
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 5px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            letter-spacing: 0.015em;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 1fr;
            height: 100vh;
            overflow: hidden;
            transition: grid-template-columns .5s cubic-bezier(.22, 1, .36, 1);
        }

        body.sidebar-collapsed { grid-template-columns: 0 1fr; }

        main.canvas-area {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 1px, rgba(255, 255, 255, 0.04) 0.5px, transparent 0.5px),
                radial-gradient(ellipse at 50% 40%, #141622 0%, var(--bg-void) 75%),
                radial-gradient(ellipse at 25% 65%, rgba(96, 240, 224, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 25%, rgba(224, 184, 96, 0.025) 0%, transparent 55%);
            background-size: 4px 4px, 100% 100%, 100% 100%, 100% 100%;
        }

        main.canvas-area::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(10, 12, 20, 0.5) 100%);
            z-index: 1;
        }

        canvas#graph-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
        }

        canvas#graph-canvas:active { cursor: grabbing; }
        canvas#graph-canvas.locked { cursor: default; }

        .sidebar-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(16, 18, 28, 0.9);
            backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all .3s ease;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        .sidebar-toggle:hover {
            color: var(--accent-cyan);
            border-color: rgba(96, 240, 224, 0.4);
            box-shadow: var(--glow-cyan), 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        aside.toolbox {
            background:
                radial-gradient(ellipse 60% 30% at 50% 0%, rgba(224, 184, 96, 0.05) 0%, transparent 100%),
                linear-gradient(180deg, #14120e 0%, #100e0c 100%);
            border-right: 1px solid rgba(224, 184, 96, 0.1);
            padding: 28px 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            transition: all .5s cubic-bezier(.22, 1, .36, 1);
        }

        body.sidebar-collapsed aside.toolbox {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-100%);
            overflow: hidden;
        }

        aside.toolbox::-webkit-scrollbar { width: 4px; }
        aside.toolbox::-webkit-scrollbar-track { background: transparent; }
        aside.toolbox::-webkit-scrollbar-thumb { background: rgba(224, 184, 96, 0.12); border-radius: 3px; }

        aside.toolbox::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 8%, rgba(224, 184, 96, 0.4) 50%, transparent 92%);
            z-index: 2;
        }

        .sb-header { padding-bottom: 22px; position: relative; z-index: 1; }

        .sb-eyebrow {
            font-family: var(--font-display);
            font-size: .7rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(224, 184, 96, 0.65);
            letter-spacing: .06em;
            margin-bottom: 10px;
            display: block;
        }

        .sb-title {
            font-family: var(--font-display);
            font-size: 1.9rem;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: .005em;
        }

        .sb-title::after {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            margin-top: 12px;
            border-radius: 1px;
            background: var(--accent-gold);
            opacity: .6;
        }

        .sb-subtitle {
            font-family: var(--font-display);
            font-size: .75rem;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
            font-weight: 300;
            font-style: italic;
            letter-spacing: .003em;
            margin-top: 2px;
        }

        .sb-search { position: relative; z-index: 1; padding-bottom: 2px; }
        .search-wrap { position: relative; }

        .search-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.32);
            border: 1px solid rgba(224, 184, 96, 0.12);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: .72rem;
            padding: 9px 30px 9px 34px;
            outline: 0;
            transition: border-color .3s ease, box-shadow .3s ease;
            border-radius: 6px;
            letter-spacing: .005em;
        }

        .search-box::placeholder { color: rgba(255, 255, 255, 0.38); font-weight: 300; font-style: italic; }
        .search-box:focus { border-color: rgba(224, 184, 96, 0.45); box-shadow: 0 0 0 3px rgba(224, 184, 96, 0.08); }

        .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.32);
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all .2s;
            opacity: 0;
            pointer-events: none;
        }
        .search-clear.visible { opacity: .6; pointer-events: auto; }
        .search-clear:hover { opacity: 1; color: var(--accent-gold); }

        .sb-gold-line {
            height: 1px;
            margin: 10px 0 0;
            background: linear-gradient(90deg, transparent, rgba(224, 184, 96, 0.2), transparent);
            position: relative;
            z-index: 1;
        }

        .sb-controls { padding-top: 16px; position: relative; z-index: 1; flex: 1; }
        
        .sb-group { position: relative; }
        .sb-group + .sb-group {
            padding-top: 14px;
            margin-top: 14px;
            border-top: 1px solid rgba(224, 184, 96, 0.08);
        }

        .sb-group-label {
            font-family: var(--font-display);
            font-size: .65rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(224, 184, 96, 0.55);
            letter-spacing: .04em;
            margin-bottom: 8px;
            display: block;
        }

        .time-section {
            background: linear-gradient(180deg, rgba(224, 184, 96, 0.03) 0%, transparent 100%);
            border: 1px solid rgba(224, 184, 96, 0.1);
            border-radius: 7px;
            padding: 11px 13px;
            position: relative;
            overflow: hidden;
        }

        .time-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(224, 184, 96, 0.2), transparent);
        }

        .time-range {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: .65rem;
            color: rgba(224, 184, 96, 0.85);
            font-weight: 400;
            margin-bottom: 6px;
            font-variant-numeric: tabular-nums;
            letter-spacing: .01em;
        }

        .time-slider-wrap { position: relative; height: 14px; margin-bottom: 5px; }

        .time-track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-50%);
            border-radius: 1px;
        }

        .time-fill {
            position: absolute;
            top: 50%;
            height: 1px;
            background: var(--accent-gold);
            transform: translateY(-50%);
            border-radius: 1px;
            pointer-events: none;
            transition: left .05s, width .05s;
            opacity: .5;
        }
        .time-fill.active { opacity: .9; box-shadow: 0 0 10px rgba(224, 184, 96, 0.2); }

        .time-slider-wrap input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            margin: 0;
            outline: none;
            pointer-events: none;
            z-index: 2;
        }

        .time-slider-wrap input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            pointer-events: all;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-gold);
            border: none;
            cursor: ew-resize;
            box-shadow: 0 0 8px rgba(224, 184, 96, 0.4);
            transition: box-shadow .2s, transform .15s;
        }
        
        .time-stats {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: var(--font-mono);
            font-size: .45rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }
        .time-stats .ts-count { color: var(--accent-gold); font-weight: 500; font-size: .58rem; }

        .toggle-group { display: flex; flex-direction: column; gap: 1px; }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: .62rem;
            color: var(--text-secondary);
            transition: all .2s ease;
            padding: 4px 7px;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .toggle-item:hover { color: var(--text-primary); background: rgba(224, 184, 96, 0.04); }
        .toggle-item input { display: none; }

        .checkmark {
            width: 12px;
            height: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0;
            border-radius: 2px;
        }

        .toggle-item input:checked ~ .checkmark {
            border-color: rgba(224, 184, 96, 0.6);
            background: rgba(224, 184, 96, 0.12);
        }

        .toggle-item input:checked ~ .checkmark::after {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent-gold);
            opacity: 1;
        }
        
        .toggle-item.disabled { opacity: .2; pointer-events: none; }
        .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        /* Category Legend */
        .category-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 8px;
            margin-top: 4px;
        }

        .cat-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .58rem;
            color: var(--text-secondary);
            padding: 2px 4px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .15s;
        }

        .cat-legend-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .cat-legend-item.dimmed {
            opacity: 0.25;
        }

        .cat-legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Focus Mode Indicator */
        .focus-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(14, 16, 26, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(96, 240, 224, 0.2);
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }

        .focus-indicator.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .focus-node-name {
            font-family: var(--font-display);
            font-size: .85rem;
            font-style: italic;
            color: var(--text-primary);
        }

        .focus-clear-btn {
            background: rgba(96, 240, 224, 0.1);
            border: 1px solid rgba(96, 240, 224, 0.3);
            color: var(--accent-cyan);
            font-size: .6rem;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all .2s;
        }

        .focus-clear-btn:hover {
            background: rgba(96, 240, 224, 0.2);
            border-color: rgba(96, 240, 224, 0.5);
        }

        /* Search Dropdown */
        .search-dropdown {
            position: fixed;
            z-index: 500;
            background: rgba(12, 11, 9, 0.98);
            backdrop-filter: blur(36px) saturate(1.15);
            border: 1px solid rgba(224, 184, 96, 0.12);
            border-radius: 8px;
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.8);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height .35s cubic-bezier(.22, 1, .36, 1), opacity .2s ease;
            pointer-events: none;
            width: 360px;
        }
        .search-dropdown.open { max-height: 400px; opacity: 1; pointer-events: auto; }

        .search-dropdown-inner {
            max-height: 350px;
            overflow-y: auto;
            padding: 4px 4px;
        }

        .search-result {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            padding: 8px 8px;
            cursor: pointer;
            transition: all .15s ease;
            border-radius: 5px;
            border: 1px solid transparent;
        }
        .search-result:hover { background: rgba(224, 184, 96, 0.04); border-color: rgba(224, 184, 96, 0.12); }
        .search-result.active { background: rgba(224, 184, 96, 0.1); border-color: rgba(224, 184, 96, 0.3); }

        .sr-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .sr-body { flex: 1; min-width: 0; padding-top: 1px; }
        .sr-name {
            font-family: var(--font-display);
            font-size: .75rem;
            color: var(--text-primary);
            font-style: italic;
        }
        .sr-category {
            font-size: .52rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(14, 16, 26, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 14px;
            width: 260px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
            border-radius: var(--radius-md);
        }

        .tt-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .tt-cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .tt-category {
            font-size: .55rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .tt-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-style: italic;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .tt-desc { font-size: .68rem; color: var(--text-secondary); line-height: 1.5; }
        
        .tt-meta {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 12px;
        }

        .tt-stat {
            font-size: .52rem;
            color: var(--text-muted);
        }
        .tt-stat-value {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Loading */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-void);
            z-index: 200;
            transition: opacity .8s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-dots { display: flex; gap: 7px; }
        .loader-dots span {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--accent-cyan);
            opacity: .25;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: .16s; }
        .loader-dots span:nth-child(3) { animation-delay: .32s; }
        @keyframes dotPulse { 0%, 80%, 100% { opacity: .25; transform: scale(.8); } 40% { opacity: 1; transform: scale(1.3); } }
        .loader-text { font-family: var(--font-mono); font-size: .55rem; color: var(--text-secondary); margin-top: 20px; text-transform: uppercase; letter-spacing: .25em; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <aside class="toolbox" id="sidebar">
        <div class="sb-header">
            <span class="sb-eyebrow">Epistemic Space Atlas</span>
            <h2 class="sb-title">Space Explorer</h2>
            <p class="sb-subtitle">Mapping the architecture of epistemic capabilities.</p>
        </div>

        <div class="sb-search">
            <div class="search-wrap">
                <svg class="search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                <input type="text" class="search-box" id="search-input" placeholder="Search nodes..." autocomplete="off">
                <button class="search-clear" id="search-clear">&times;</button>
            </div>
        </div>

        <div class="sb-gold-line"></div>

        <div class="sb-controls">
            
            <div class="sb-group">
                <span class="sb-group-label">Temporal Scope</span>
                <div class="time-section">
                    <div class="time-range">
                        <span id="time-min-label">&mdash;</span>
                        <span id="time-max-label">&mdash;</span>
                    </div>
                    <div class="time-slider-wrap">
                        <div class="time-track"></div>
                        <div class="time-fill" id="time-fill"></div>
                        <input type="range" id="time-min" min="0" max="1000" value="0">
                        <input type="range" id="time-max" min="0" max="1000" value="1000">
                    </div>
                    <div class="time-stats">
                        <span class="ts-count" id="time-visible-count">0</span>
                        <span>of <span id="time-total-count">0</span> nodes</span>
                    </div>
                </div>
            </div>

            <div class="sb-group">
                <span class="sb-group-label">Visual Lenses</span>
                <div class="toggle-group" id="lens-controls">
                    <label class="toggle-item"><input type="checkbox" id="lens-hulls"><span class="checkmark"></span>Category Hulls</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-heatmap"><span class="checkmark"></span>Constraint Heatmap</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-centrality"><span class="checkmark"></span>Centrality Sizing</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-confidence-color"><span class="checkmark"></span>Confidence Gradient</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-flow" checked><span class="checkmark"></span>Luminous Flow</label>
                    <label class="toggle-item"><input type="checkbox" id="lens-observability"><span class="checkmark"></span>Confidence Ghosting</label>
                </div>
            </div>

            <div class="sb-group">
                <span class="sb-group-label">Categories</span>
                <div class="category-legend" id="category-legend"></div>
            </div>

        </div>
    </aside>

    <main class="canvas-area">
        <button class="sidebar-toggle" id="sidebar-toggle-btn">&#9776;</button>
        <canvas id="graph-canvas"></canvas>
        
        <div class="focus-indicator" id="focus-indicator">
            <span class="focus-node-name" id="focus-node-name"></span>
            <button class="focus-clear-btn" id="focus-clear-btn">Clear Focus</button>
        </div>
        
        <div id="tooltip">
            <div class="tt-header">
                <div class="tt-cat-dot" id="tt-cat-dot"></div>
                <span class="tt-category" id="tt-category"></span>
            </div>
            <div class="tt-title" id="tt-title"></div>
            <div class="tt-desc" id="tt-desc"></div>
            <div class="tt-meta">
                <span class="tt-stat">Connections: <span class="tt-stat-value" id="tt-connections">0</span></span>
                <span class="tt-stat">Confidence: <span class="tt-stat-value" id="tt-confidence">0%</span></span>
            </div>
        </div>
    </main>

    <div class="search-dropdown" id="search-dropdown">
        <div class="search-dropdown-inner" id="search-dropdown-inner"></div>
    </div>

    <div id="loading-overlay">
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <div class="loader-text" id="loader-msg">Initializing graph</div>
    </div>

    <script>
        /* ═══════ UTILITIES ═══════ */
        function hexToRGBA(h,a){
            if(!h||h.startsWith('rgb'))return h;
            var r=parseInt(h.slice(1,3),16);
            var g=parseInt(h.slice(3,5),16);
            var b=parseInt(h.slice(5,7),16);
            return'rgba('+r+','+g+','+b+','+a+')';
        }
        
        function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
        function isFiniteNum(v){return typeof v==='number'&&isFinite(v);}

        /* ═══════ CATEGORY COLOR SYSTEM ═══════ */
        // Colors are generated dynamically from the data — no hardcoded
        // category → color map. Each unique category discovered in the
        // dataset gets a stable, visually distinct color via golden-angle
        // hue distribution, so it works for any schema/dataset.
        var CATEGORY_COLORS = {};
        var _catColorIdx = 0;

        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            var c = (1 - Math.abs(2 * l - 1)) * s;
            var x = c * (1 - Math.abs((h / 60) % 2 - 1));
            var m = l - c / 2;
            var r = 0, g = 0, b = 0;
            if (h < 60)       { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else              { r = c; g = 0; b = x; }
            r = Math.round((r + m) * 255);
            g = Math.round((g + m) * 255);
            b = Math.round((b + m) * 255);
            return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
        }

        function catColor(cat) {
            if (!CATEGORY_COLORS[cat]) {
                var hue = (_catColorIdx * 137.508) % 360;
                CATEGORY_COLORS[cat] = hslToHex(hue, 62, 60);
                _catColorIdx++;
            }
            return CATEGORY_COLORS[cat];
        }

        /* ═══════ STATE ═══════ */
        var nodes=[], gE=[], nM={};
        var alpha=1;
        var cam={x:0,y:0,z:1}, camTgt=null;
        var hovN=null, selN=null, dragN=null;
        var isPan=false, panS={x:0,y:0};
        var W=0, H=0;
        var tR={min:-Infinity,max:Infinity}, tRF={min:0,max:0};
        var dLoaded=false;
        var activeCategories = new Set();
        var catVisibility = {};

        var canvas=document.getElementById('graph-canvas'),ctx=canvas.getContext('2d');

        /* ═══════ SIMULATION CONSTANTS ═══════ */
        var REP=300, SL=120, SS=0.015, CC2=0.006, CG=0.01, AS=0.008, DR=0.88;

        /* ═══════ AMBIENT & DUST ═══════ */
        var ambBlobs=[], dustParts=[];
        
        function initAmb(){
            var colors = Object.values(CATEGORY_COLORS);
            for(var i=0;i<6;i++){
                ambBlobs.push({
                    x:Math.random()*2000,
                    y:Math.random()*2000,
                    r:Math.random()*300+180,
                    vx:(Math.random()-0.5)*0.1,
                    vy:(Math.random()-0.5)*0.06,
                    color:colors[i%colors.length],
                    opacity:Math.random()*0.018+0.006
                });
            }
        }
        
        function drawAmb(){
            ambBlobs.forEach(function(b){
                b.x+=b.vx; b.y+=b.vy;
                if(b.x<-b.r)b.x=W+b.r;
                if(b.x>W+b.r)b.x=-b.r;
                if(b.y<-b.r)b.y=H+b.r;
                if(b.y>H+b.r)b.y=-b.r;
                var grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
                grd.addColorStop(0,hexToRGBA(b.color,b.opacity));
                grd.addColorStop(1,hexToRGBA(b.color,0));
                ctx.fillStyle=grd;
                ctx.beginPath();
                ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
                ctx.fill();
            });
        }
        
        function initDust(){
            for(var i=0;i<40;i++){
                dustParts.push({
                    x:Math.random()*2000,
                    y:Math.random()*2000,
                    size:Math.random()*1.0+0.3,
                    speed:Math.random()*0.18+0.03,
                    angle:Math.random()*Math.PI*2,
                    opacity:Math.random()*0.1+0.02,
                    drift:Math.random()*0.002-0.001
                });
            }
        }
        
        function drawDust(){
            dustParts.forEach(function(p){
                p.x+=Math.cos(p.angle)*p.speed;
                p.y+=Math.sin(p.angle)*p.speed;
                p.angle+=p.drift;
                if(p.x<-10)p.x=W+10;
                if(p.x>W+10)p.x=-10;
                if(p.y<-10)p.y=H+10;
                if(p.y>H+10)p.y=-10;
                ctx.beginPath();
                ctx.arc(p.x,p.y,Math.max(0.5,p.size),0,Math.PI*2);
                ctx.fillStyle=hexToRGBA('#8892b0',p.opacity);
                ctx.fill();
            });
        }

        /* ═══════ VIEW HELPERS ═══════ */
        function sCV(){
            var r=canvas.parentElement.getBoundingClientRect();
            W=r.width; H=r.height;
            canvas.width=W*devicePixelRatio;
            canvas.height=H*devicePixelRatio;
            ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
        }
        
        function resize(){sCV();if(dLoaded)fCam();}
        
        function fCam(){
            var v=nodes.filter(function(n){return n.visible});
            if(!v.length)return;
            var x1=Infinity,x2=-Infinity,y1=Infinity,y2=-Infinity;
            v.forEach(function(n){
                if(n.x<x1)x1=n.x;
                if(n.x>x2)x2=n.x;
                if(n.y<y1)y1=n.y;
                if(n.y>y2)y2=n.y;
            });
            if(x1===Infinity)return;
            var p=140,gw=x2-x1+p*2,gh=y2-y1+p*2;
            var z=Math.min(W/gw,H/gh,1.1);
            cam.z=z;
            cam.x=W/2-((x1+x2)/2)*z;
            cam.y=H/2-((y1+y2)/2)*z;
            camTgt=null;
        }
        
        function pTN(nd){
            if(!nd)return;
            var tz=Math.max(cam.z,1.3);
            camTgt={x:W/2-nd.x*tz,y:H/2-nd.y*tz,z:tz};
        }
        
        function uCP(){
            if(!camTgt)return;
            var dx=camTgt.x-cam.x,dy=camTgt.y-cam.y,dz=camTgt.z-cam.z;
            if(Math.abs(dx)<.2&&Math.abs(dy)<.2&&Math.abs(dz)<.0005){
                cam.x=camTgt.x; cam.y=camTgt.y; cam.z=camTgt.z;
                camTgt=null; return;
            }
            cam.x+=dx*.08;
            cam.y+=dy*.08;
            cam.z+=dz*.08;
        }
        
        function w2s(wx,wy){return{x:wx*cam.z+cam.x,y:wy*cam.z+cam.y};}
        function s2w(sx,sy){return{x:(sx-cam.x)/cam.z,y:(sy-cam.y)/cam.z};}
        
        /* ═══════ CONTEXTUAL LINKS ═══════ */
        function getConnectedNodes(node){
            if(!node)return{nodes:new Set(),edges:new Set()};
            var connected=new Set([node.id]);
            var edges=new Set();
            gE.forEach(function(e){
                if(e.source===node.id||e.target===node.id){
                    connected.add(e.source);
                    connected.add(e.target);
                    edges.add(e);
                }
            });
            return{nodes:connected,edges:edges};
        }

        /* ═══════ FORCE SIMULATION ═══════ */
        function simTick(){
            var vis=nodes.filter(function(n){return n.visible&&!n.pinned});
            if(!vis.length)return;
            alpha*=0.997;
            if(alpha<0.002)alpha=0.002;
            var i,j,n=vis.length;
            
            // Repulsion
            for(i=0;i<n;i++){
                var a=vis[i];
                var fx=0,fy=0;
                for(j=0;j<n;j++){
                    if(i===j)continue;
                    var b=vis[j];
                    var dx=a.x-b.x,dy=a.y-b.y;
                    var d2=dx*dx+dy*dy;
                    if(d2<1)d2=1;
                    var d=Math.sqrt(d2);
                    if(d<REP){
                        var f=(REP-d)/d*SS*alpha;
                        fx+=dx*f; fy+=dy*f;
                    }
                }
                a.vx=(a.vx||0)+fx;
                a.vy=(a.vy||0)+fy;
            }
            
            // Category Center Gravity
            var cxs={},cys={},ccs={};
            vis.forEach(function(nd){
                var c=nd.category;
                if(!cxs[c]){cxs[c]=0;cys[c]=0;ccs[c]=0;}
                cxs[c]+=nd.x; cys[c]+=nd.y; ccs[c]++;
            });
            vis.forEach(function(nd){
                var c=nd.category;
                var cnt=Math.max(1,ccs[c]||1);
                var ccx=cxs[c]/cnt,ccy=cys[c]/cnt;
                nd.vx=(nd.vx||0)+(ccx-nd.x)*CC2*alpha;
                nd.vy=(nd.vy||0)+(ccy-nd.y)*CC2*alpha;
            });
            
            // Edges
            gE.forEach(function(e){
                if(!e.visible)return;
                var s=nM[e.source],t=nM[e.target];
                if(!s||!t)return;
                var dx=t.x-s.x,dy=t.y-s.y;
                var d=Math.sqrt(dx*dx+dy*dy);
                if(d<1)return;
                var f=(d-SL)/d*AS*alpha;
                if(!s.pinned){s.vx=(s.vx||0)+dx*f; s.vy=(s.vy||0)+dy*f;}
                if(!t.pinned){t.vx=(t.vx||0)-dx*f; t.vy=(t.vy||0)-dy*f;}
            });
            
            // Center gravity
            vis.forEach(function(nd){
                nd.vx=(nd.vx||0)-nd.x*CG*alpha*0.5;
                nd.vy=(nd.vy||0)-nd.y*CG*alpha*0.5;
            });
            
            // Apply Velocity
            vis.forEach(function(nd){
                nd.vx*=DR; nd.vy*=DR;
                var spd=Math.sqrt(nd.vx*nd.vx+nd.vy*nd.vy);
                if(spd>45){nd.vx=nd.vx/spd*45; nd.vy=nd.vy/spd*45;}
                nd.x+=nd.vx; nd.y+=nd.vy;
            });
        }

        /* ═══════ DRAWING ═══════ */
        function drawEdges(){
            var showFlow=document.getElementById('lens-flow').checked;
            var context = getConnectedNodes(selN||hovN);
            var hasContext = (selN || hovN) != null;
            
            gE.forEach(function(e){
                if(!e.visible)return;
                var s=nM[e.source],t=nM[e.target];
                if(!s||!t)return;
                
                var sp=w2s(s.x,s.y),tp=w2s(t.x,t.y);
                
                var isInContext = !hasContext || context.edges.has(e);
                var baseA, lineWidth;
                
                if(isInContext && hasContext){
                    baseA = 0.55;
                    lineWidth = 1.5;
                } else if(hasContext){
                    baseA = 0.04;
                    lineWidth = 0.4;
                } else {
                    baseA = 0.12;
                    lineWidth = 0.7;
                }
                
                // Use source node color for edge
                var edgeCol = CATEGORY_COLORS[s.category] || '#48e8d8';
                
                ctx.strokeStyle=hexToRGBA(edgeCol,baseA);
                ctx.lineWidth=lineWidth;
                ctx.beginPath();
                ctx.moveTo(sp.x,sp.y);
                ctx.lineTo(tp.x,tp.y);
                ctx.stroke();
                
                // Draw directional indicator for context edges
                if(isInContext && hasContext){
                    var mx=(sp.x+tp.x)/2, my=(sp.y+tp.y)/2;
                    var angle=Math.atan2(tp.y-sp.y,tp.x-sp.x);
                    ctx.fillStyle=hexToRGBA(edgeCol,0.7);
                    ctx.beginPath();
                    ctx.moveTo(mx+Math.cos(angle)*4,my+Math.sin(angle)*4);
                    ctx.lineTo(mx+Math.cos(angle+2.5)*3,my+Math.sin(angle+2.5)*3);
                    ctx.lineTo(mx+Math.cos(angle-2.5)*3,my+Math.sin(angle-2.5)*3);
                    ctx.closePath();
                    ctx.fill();
                }
            });
        }

        function drawHulls(){
            if(!document.getElementById('lens-hulls').checked)return;
            var catC={};
            nodes.forEach(function(n){
                if(n.visible){
                    if(!catC[n.category])catC[n.category]=[];
                    catC[n.category].push(n);
                }
            });
            Object.keys(catC).forEach(function(cat){
                var pts=catC[cat];
                if(pts.length<3)return;
                var sPts=pts.map(function(p){return w2s(p.x,p.y)});
                var cx=0,cy=0;
                sPts.forEach(function(p){cx+=p.x;cy+=p.y});
                cx/=sPts.length; cy/=sPts.length;
                sPts.sort(function(a,b){
                    return Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx);
                });
                ctx.beginPath();
                ctx.moveTo(sPts[0].x,sPts[0].y);
                for(var i=1;i<sPts.length;i++)ctx.lineTo(sPts[i].x,sPts[i].y);
                ctx.closePath();
                var hullCol=CATEGORY_COLORS[cat]||'#666';
                var hgrd=ctx.createRadialGradient(cx,cy,0,cx,cy,180);
                hgrd.addColorStop(0,hexToRGBA(hullCol,0.035));
                hgrd.addColorStop(1,hexToRGBA(hullCol,0));
                ctx.fillStyle=hgrd;
                ctx.fill();
                ctx.strokeStyle=hexToRGBA(hullCol,0.1);
                ctx.lineWidth=1;
                ctx.stroke();
            });
        }

        function drawNodes(){
            var showCent=document.getElementById('lens-centrality').checked;
            var showConfCol=document.getElementById('lens-confidence-color').checked;
            var showObs=document.getElementById('lens-observability').checked;
            var maxDeg=Math.max(1,nodes.reduce(function(a,n){return Math.max(a,n.degree)},0));
            var context = getConnectedNodes(selN||hovN);
            var hasContext = (selN||hovN)!==null;

            nodes.forEach(function(nd){
                if(!nd.visible)return;
                var sp=w2s(nd.x,nd.y);
                var isHov=hovN&&hovN.id===nd.id;
                var isSel=selN&&selN.id===nd.id;
                var isInContext = !hasContext || context.nodes.has(nd.id);
                
                var baseR=showCent?(4+nd.degree*1.4):(5+nd.degree*0.6);
                var r=Math.max(3,baseR)*cam.z;
                r=Math.max(2.5,Math.min(r,28));
                if(isHov||isSel)r*=1.4;
                
                // Get category color
                var col=CATEGORY_COLORS[nd.category]||'#888888';
                if(showConfCol){
                    var conf=nd.confidence||0.7;
                    // Interpolate with category color based on confidence
                    col=blendWithConfidence(col,conf);
                }
                
                var alpha2 = isInContext?1:(hasContext?0.08:1);
                if(showObs&&!isInContext){
                    var c=nd.confidence||0.7;
                    if(c<0.4)alpha2=0.06;
                    else if(c<0.65)alpha2=0.15;
                }
                
                ctx.globalAlpha=alpha2;
                
                // Glow for hovered/selected
                if((isHov||isSel)&&isInContext){
                    var glowR=r+12;
                    var gGrd=ctx.createRadialGradient(sp.x,sp.y,r*0.4,sp.x,sp.y,glowR);
                    gGrd.addColorStop(0,hexToRGBA(col,0.35));
                    gGrd.addColorStop(1,hexToRGBA(col,0));
                    ctx.fillStyle=gGrd;
                    ctx.beginPath();
                    ctx.arc(sp.x,sp.y,glowR,0,Math.PI*2);
                    ctx.fill();
                }
                
                // Node body
                var nGrd=ctx.createRadialGradient(sp.x-r*0.3,sp.y-r*0.3,0,sp.x,sp.y,r);
                nGrd.addColorStop(0,hexToRGBA(lighten(col,30),1));
                nGrd.addColorStop(0.6,hexToRGBA(col,1));
                nGrd.addColorStop(1,hexToRGBA(darken(col,20),0.9));
                ctx.fillStyle=nGrd;
                ctx.beginPath();
                ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
                ctx.fill();
                
                // Border for selected
                if(isSel){
                    ctx.strokeStyle=hexToRGBA('#ffffff',0.8);
                    ctx.lineWidth=2;
                    ctx.stroke();
                }
                
                // Label
                if(cam.z>0.5&&r>5&&isInContext){
                    ctx.font='500 '+Math.max(7,r*0.85)+'px Inter';
                    ctx.textAlign='center';
                    ctx.textBaseline='top';
                    ctx.fillStyle=hexToRGBA('#e0e4f0',alpha2*(isHov||isSel?0.95:0.75));
                    var lbl=nd.name||'';
                    if(lbl.length>20)lbl=lbl.substring(0,18)+'...';
                    ctx.fillText(lbl,sp.x,sp.y+r+5);
                }
                ctx.globalAlpha=1;
            });
        }
        
        function lighten(hex,percent){
            var num=parseInt(hex.slice(1),16);
            var amt=Math.round(2.55*percent);
            var R=Math.min(255,(num>>16)+amt);
            var G=Math.min(255,((num>>8)&0x00FF)+amt);
            var B=Math.min(255,(num&0x0000FF)+amt);
            return'#'+(0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1);
        }
        
        function darken(hex,percent){
            var num=parseInt(hex.slice(1),16);
            var amt=Math.round(2.55*percent);
            var R=Math.max(0,(num>>16)-amt);
            var G=Math.max(0,((num>>8)&0x00FF)-amt);
            var B=Math.max(0,(num&0x0000FF)-amt);
            return'#'+(0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1);
        }
        
        function blendWithConfidence(baseCol,conf){
            // Higher confidence = more saturated category color
            // Lower confidence = more desaturated/washed
            var num=parseInt(baseCol.slice(1),16);
            var r=num>>16,g=(num>>8)&0xFF,b=num&0xFF;
            var gray=0.299*r+0.587*g+0.114*b;
            var t=conf; // confidence as blend factor
            r=Math.round(r*t+gray*(1-t)*0.5);
            g=Math.round(g*t+gray*(1-t)*0.5);
            b=Math.round(b*t+gray*(1-t)*0.5);
            return'rgb('+r+','+g+','+b+')';
        }

        function render(){
            requestAnimationFrame(render);
            uCP();simTick();
            ctx.clearRect(0,0,W,H);
            drawAmb();drawDust();
            drawHulls();drawEdges();drawNodes();
        }

        /* ═══════ FILTERING ═══════ */
        function uFilt(){
            var vc=0;
            nodes.forEach(function(n){
                var inCat=catVisibility[n.category]!==false;
                var inTime=isFiniteNum(n.year)?n.year>=tR.min&&n.year<=tR.max:true;
                n.visible=inCat&&inTime;
                if(n.visible)vc++;
            });
            gE.forEach(function(e){
                var s=nM[e.source],t=nM[e.target];
                e.visible=s&&t&&s.visible&&t.visible;
            });
            document.getElementById('time-visible-count').textContent=vc;
        }

        /* ═══════ CATEGORY LEGEND ═══════ */
        function buildCategoryLegend(){
            var container=document.getElementById('category-legend');
            var html='';
            Object.keys(CATEGORY_COLORS).forEach(function(cat){
                var col=CATEGORY_COLORS[cat];
                var shortName=cat.replace('Epistemic ','').replace(' (Target Domain)','').replace(' (Epistemic Blueprint)','').replace(' (Inductive Bias)','').replace(' (Activity)','');
                html+='<div class="cat-legend-item" data-category="'+cat+'">';
                html+='<div class="cat-legend-dot" style="background:'+col+'"></div>';
                html+='<span>'+shortName+'</span>';
                html+='</div>';
            });
            container.innerHTML=html;
            
            container.querySelectorAll('.cat-legend-item').forEach(function(el){
                el.addEventListener('click',function(){
                    var cat=el.dataset.category;
                    catVisibility[cat]=catVisibility[cat]===false?true:false;
                    el.classList.toggle('dimmed',!catVisibility[cat]);
                    uFilt();
                });
            });
        }

        /* ═══════ DATA INITIALIZATION ═══════ */
        function initGraph(data){
            nM={};nodes=[];gE=[];
            var minY=Infinity,maxY=-Infinity,degC={};

            data.forEach(function(r){
                if(!r.id)return;
                var id=r.id.replace(/\s+/g,'_');
                var yr=null;
                if(r.historicalContext&&r.historicalContext.chronology){
                    var years=r.historicalContext.chronology.map(function(c){return c.year}).filter(isFiniteNum);
                    if(years.length)yr=Math.min.apply(null,years);
                }
                if(yr!==null&&yr<minY)minY=yr;
                if(yr!==null&&yr>maxY)maxY=yr;
                
                var nd={
                    id:id,
                    name:r.name||r.id,
                    category:r.category,
                    description:r.description||'',
                    confidence:((r.metadata&&r.metadata.confidenceScore)||0.7),
                    degree:0,
                    year:yr,
                    x:(Math.random()-.5)*900,
                    y:(Math.random()-.5)*900,
                    vx:0,vy:0,
                    visible:true,
                    pinned:false,
                    _raw:r
                };
                nodes.push(nd);
                nM[id]=nd;
                degC[id]=0;
                catVisibility[r.category]=true;
                // Assign a dynamic color for this category
                catColor(r.category);
            });

            data.forEach(function(r){
                if(!r.relationships)return;
                r.relationships.forEach(function(rel){
                    var sid=r.id.replace(/\s+/g,'_');
                    var tid=(rel.targetNodeId||'').replace(/\s+/g,'_');
                    if(!nM[sid]||!nM[tid])return;
                    gE.push({
                        source:sid,
                        target:tid,
                        relType:rel.relationshipType,
                        visible:true
                    });
                    degC[sid]=(degC[sid]||0)+1;
                    degC[tid]=(degC[tid]||0)+1;
                });
            });

            nodes.forEach(function(n){n.degree=degC[n.id]||0});
            
            tRF.min=minY===Infinity?0:minY;
            tRF.max=maxY===-Infinity?2025:maxY;
            tR.min=tRF.min;
            tR.max=tRF.max;
            
            document.getElementById('time-total-count').textContent=nodes.length;
            uTimeFill();
            buildCategoryLegend();
            uFilt();
            
            sCV();fCam();
            dLoaded=true;
            initAmb();initDust();
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        /* ═══════ UI CONTROLS ═══════ */
        function uTimeFill(){
            var mn=parseInt(document.getElementById('time-min').value);
            var mx=parseInt(document.getElementById('time-max').value);
            if(mn>mx){var tmp=mn;mn=mx;mx=tmp;}
            var range=tRF.max-tRF.min;
            if(range<=0)range=1;
            tR.min=tRF.min+mn/1000*range;
            tR.max=tRF.min+mx/1000*range;
            
            var fill=document.getElementById('time-fill');
            fill.style.left=(mn/10)+'%';
            fill.style.width=((mx-mn)/10)+'%';
            document.getElementById('time-min-label').textContent=tR.min>0?'c. '+Math.round(tR.min):'—';
            document.getElementById('time-max-label').textContent=tR.max<Infinity?'c. '+Math.round(tR.max):'—';
        }
        
        function doSearch(q){
            var dd=document.getElementById('search-dropdown');
            var inner=document.getElementById('search-dropdown-inner');
            var inp=document.getElementById('search-input');
            var r=inp.getBoundingClientRect();
            dd.style.top=(r.bottom+4)+'px';
            dd.style.left=r.left+'px';
            dd.style.width=Math.max(320,r.width)+'px';

            if(!q){dd.classList.remove('open');return;}
            var res=nodes.filter(function(n){
                return n.name.toLowerCase().indexOf(q.toLowerCase())>=0||
                       n.category.toLowerCase().indexOf(q.toLowerCase())>=0;
            }).slice(0,12);
            
            var html='';
            res.forEach(function(nd){
                var col=CATEGORY_COLORS[nd.category]||'#888';
                html+='<div class="search-result" data-id="'+nd.id+'">';
                html+='<div class="sr-dot" style="background:'+col+'"></div>';
                html+='<div class="sr-body">';
                html+='<span class="sr-name">'+nd.name+'</span>';
                html+='<span class="sr-category">'+nd.category+'</span>';
                html+='</div></div>';
            });
            inner.innerHTML=html;
            dd.classList.add('open');
            
            inner.querySelectorAll('.search-result').forEach(function(el){
                el.addEventListener('click',function(){
                    var id=el.dataset.id;
                    var nd=nM[id];
                    if(nd){
                        pTN(nd);
                        selN=nd;
                        updateFocusIndicator();
                    }
                    dd.classList.remove('open');
                    document.getElementById('search-input').value='';
                    document.getElementById('search-clear').classList.remove('visible');
                });
            });
        }
        
        function updateFocusIndicator(){
            var fi=document.getElementById('focus-indicator');
            var fn=document.getElementById('focus-node-name');
            if(selN){
                fn.textContent=selN.name;
                fi.classList.add('visible');
            }else{
                fi.classList.remove('visible');
            }
        }
        
        function clearFocus(){
            selN=null;
            updateFocusIndicator();
        }

        /* ═══════ EVENT LISTENERS ═══════ */
        canvas.addEventListener('mousedown',function(e){
            var r=canvas.getBoundingClientRect();
            var sx=e.clientX-r.left,sy=e.clientY-r.top;
            var nd=hitNode(sx,sy);
            if(nd){
                dragN=nd;
                canvas.classList.add('locked');
            }else{
                isPan=true;
                panS={x:e.clientX-cam.x,y:e.clientY-cam.y};
                canvas.classList.add('locked');
            }
        });
        
        canvas.addEventListener('mousemove',function(e){
            var r=canvas.getBoundingClientRect();
            var sx=e.clientX-r.left,sy=e.clientY-r.top;
            if(dragN){
                var wp=s2w(sx,sy);
                dragN.x=wp.x;
                dragN.y=wp.y;
                dragN.vx=0;
                dragN.vy=0;
                return;
            }
            if(isPan){
                cam.x=e.clientX-panS.x;
                cam.y=e.clientY-panS.y;
                camTgt=null;
                return;
            }
            var nd=hitNode(sx,sy);
            if(nd!==hovN){
                hovN=nd;
                if(nd)showTT(nd,sx,sy);
                else hideTT();
            }
        });
        
        canvas.addEventListener('mouseup',function(e){
            if(dragN&&!isPan){
                // Check if it was a click (minimal drag)
                // Toggle selection on click
            }
            dragN=null;
            isPan=false;
            canvas.classList.remove('locked');
        });
        
        canvas.addEventListener('click',function(e){
            var r=canvas.getBoundingClientRect();
            var sx=e.clientX-r.left,sy=e.clientY-r.top;
            var nd=hitNode(sx,sy);
            if(nd){
                if(selN===nd){
                    selN=null; // Deselect
                }else{
                    selN=nd; // Select
                }
                updateFocusIndicator();
            }
        });
        
        canvas.addEventListener('mouseleave',function(){
            hovN=null;
            hideTT();
            if(!dragN){
                isPan=false;
                canvas.classList.remove('locked');
            }
        });
        
        canvas.addEventListener('wheel',function(e){
            e.preventDefault();
            var r=canvas.getBoundingClientRect();
            var sx=e.clientX-r.left,sy=e.clientY-r.top;
            var wp=s2w(sx,sy);
            var f=e.deltaY>0?0.88:1.12;
            var nz=clamp(cam.z*f,0.04,6);
            cam.x=sx-wp.x*nz;
            cam.y=sy-wp.y*nz;
            cam.z=nz;
            camTgt=null;
        },{passive:false});

        function hitNode(sx,sy){
            var wp=s2w(sx,sy);
            var best=null,bestD=Infinity;
            nodes.forEach(function(n){
                if(!n.visible)return;
                var dx=n.x-wp.x,dy=n.y-wp.y;
                var d2=dx*dx+dy*dy;
                var r=(5+n.degree*0.6)*2;
                if(d2<r*r&&d2<bestD){
                    bestD=d2;
                    best=n;
                }
            });
            return best;
        }
        
        function showTT(nd,sx,sy){
            var tt=document.getElementById('tooltip');
            var col=CATEGORY_COLORS[nd.category]||'#888';
            document.getElementById('tt-cat-dot').style.background=col;
            document.getElementById('tt-category').textContent=nd.category;
            document.getElementById('tt-title').textContent=nd.name;
            document.getElementById('tt-desc').textContent=nd.description||'No description available.';
            document.getElementById('tt-connections').textContent=nd.degree;
            document.getElementById('tt-confidence').textContent=Math.round((nd.confidence||0.7)*100)+'%';
            tt.style.display='block';
            var tx=sx+18,ty=sy-12;
            if(tx+260>W)tx=sx-275;
            if(ty+140>H)ty=H-150;
            tt.style.left=tx+'px';
            tt.style.top=ty+'px';
        }
        
        function hideTT(){
            document.getElementById('tooltip').style.display='none';
        }

        document.getElementById('sidebar-toggle-btn').addEventListener('click',function(){
            document.body.classList.toggle('sidebar-collapsed');
            setTimeout(resize,550);
        });
        
        document.getElementById('time-min').addEventListener('input',function(){
            uTimeFill();uFilt();
        });
        
        document.getElementById('time-max').addEventListener('input',function(){
            uTimeFill();uFilt();
        });
        
        document.getElementById('search-input').addEventListener('input',function(){
            var q=this.value.trim();
            document.getElementById('search-clear').classList.toggle('visible',q.length>0);
            doSearch(q);
        });
        
        document.getElementById('search-clear').addEventListener('click',function(){
            document.getElementById('search-input').value='';
            this.classList.remove('visible');
            doSearch('');
        });
        
        document.getElementById('focus-clear-btn').addEventListener('click',function(){
            clearFocus();
        });

        // Lens toggles
        document.querySelectorAll('#lens-controls input').forEach(function(inp){
            inp.addEventListener('change',function(){});
        });

        /* ═══════ BOOT ═══════ */
        resize();render();window.addEventListener('resize',resize);
        
        var loaderMsg=document.getElementById('loader-msg');
        loaderMsg.textContent='Loading epistemic space';
        fetch('../data/index/data.json')
            .then(function(r){
                if(!r.ok)throw new Error('HTTP '+r.status);
                return r.json();
            })
            .then(function(d){
                loaderMsg.textContent='Building graph';
                var arr=Array.isArray(d)?d:(d.nodes||d.categories||[]);
                if(!arr.length)throw new Error('Empty dataset');
                setTimeout(function(){initGraph(arr)},50);
            })
            .catch(function(err){
                loaderMsg.innerHTML='<span style="color:#f07080">Failed to load data.<br>'+err.message+'</span>';
            });
    </script>
</body>
</html>
