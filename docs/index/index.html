<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epistemic Space Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Oxford Common Room — deep indigo-black canvas */
            --bg-void: #0b0e14;
            --bg-surface: #11151e;
            --bg-card: #161b26;
            --bg-elevated: #1d2330;
            --bg-hover: rgba(255, 255, 255, 0.04);

            /* Gilt edge for selection — fine bookbinding */
            --gilt: #C4B998;
            /* Warm off-white parchment text (canvas labels) */
            --parchment: #D6D1C4;
            /* Faint warm dark grey for edges — graphite on dark paper */
            --thread: #4a4a4a;

            /* Text hierarchy */
            --text-primary: #f4f3f1;
            --text-secondary: #a8a5b0;
            --text-muted: #9290aa;
            --text-ghost: #82809a;

            /* Refined accent system */
            --accent-copper: #c9956c;
            --accent-copper-light: #dbb08a;
            --accent-sage: #7ba388;
            --accent-plum: #9b7eb0;
            --accent-rose: #c47d8a;
            --accent-amber: #d4a857;
            --accent-steel: #6b8caa;
            --accent-cyan: #4dd4c4;

            /* Legacy aliases (kept for sidebar/legend continuity) */
            --accent-gold: #c9956c;

            /* Borders */
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-medium: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.12);

            /* Typography */
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --radius-sm: 5px;
            --radius-md: 8px;
            --radius-lg: 12px;

            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Gilt text selection */
        ::selection { background: rgba(201, 149, 108, 0.28); color: var(--parchment); }
        ::-moz-selection { background: rgba(201, 149, 108, 0.28); color: var(--parchment); }

        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        *::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08); border-radius: 4px;
            border: 2px solid transparent; background-clip: padding-box; transition: background 0.2s ease;
        }
        *::-webkit-scrollbar-thumb:hover { background: rgba(201, 149, 108, 0.4); background-clip: padding-box; }
        * { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.08) transparent; }

        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            letter-spacing: 0.015em;
            display: grid;
            grid-template-columns: 320px 1fr 0;
            grid-template-rows: 1fr;
            height: 100vh;
            overflow: hidden;
            transition: grid-template-columns .5s cubic-bezier(.22, 1, .36, 1);
        }

        body.sidebar-collapsed { grid-template-columns: 0 1fr 0; }
        body.detail-open { grid-template-columns: 320px 1fr 400px; }
        body.sidebar-collapsed.detail-open { grid-template-columns: 0 1fr 400px; }

        main.canvas-area {
            position: relative;
            overflow: hidden;
            background: var(--bg-void);
        }

        /* Oxford spec: pure deep indigo-black, subtle radial vignette, no texture/grid */
        main.canvas-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--bg-void);
            z-index: 0;
        }

        /* Subtle radial vignette — darker edges draw attention inward */
        main.canvas-area::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(0, 0, 0, 0.55) 100%);
            z-index: 1;
        }

        canvas#graph-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
            position: relative;
            z-index: 2;
        }

        canvas#graph-canvas:active { cursor: grabbing; }
        canvas#graph-canvas.locked { cursor: default; }

        .sidebar-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(31, 35, 45, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all .3s ease;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-toggle:hover {
            color: var(--text-primary);
            border-color: var(--border-strong);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Floating canvas controls (fit view, etc.) */
        .canvas-control {
            position: absolute;
            z-index: 20;
            background: rgba(31, 35, 45, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .3s ease;
            box-shadow: var(--shadow-sm);
        }

        .canvas-control:hover {
            color: var(--accent-copper-light);
            border-color: rgba(201, 149, 108, 0.35);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Fit-view button anchors to the bottom-right of the canvas area. */
        #fit-view-btn {
            bottom: 20px;
            right: 20px;
        }

        aside.toolbox {
            background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg-void) 100%);
            border-right: 1px solid var(--border-medium);
            padding: 28px 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            transition: all .5s cubic-bezier(.22, 1, .36, 1);
        }

        body.sidebar-collapsed aside.toolbox {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-100%);
            overflow: hidden;
        }

        aside.toolbox::-webkit-scrollbar { width: 6px; }
        aside.toolbox::-webkit-scrollbar-track { background: transparent; }
        aside.toolbox::-webkit-scrollbar-thumb { background: rgba(201, 149, 108, 0.16); border-radius: 3px; }
        aside.toolbox::-webkit-scrollbar-thumb:hover { background: rgba(201, 149, 108, 0.4); }

        .sb-header { padding-bottom: 22px; position: relative; z-index: 1; }

        .sb-eyebrow {
            font-family: var(--font-display);
            font-size: .7rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(201, 149, 108, 0.75);
            letter-spacing: .06em;
            margin-bottom: 10px;
            display: block;
        }

        .sb-title {
            font-family: var(--font-display);
            font-size: 1.9rem;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: .005em;
            /* Gilt underline — fine bookbinding cue */
            background: linear-gradient(90deg, var(--accent-copper), transparent) bottom left / 60% 1px no-repeat;
            padding-bottom: 5px;
        }

        .sb-subtitle {
            font-family: var(--font-display);
            font-size: .75rem;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
            font-weight: 300;
            font-style: italic;
            letter-spacing: .003em;
            margin-top: 8px;
        }

        .sb-search { position: relative; z-index: 1; padding-bottom: 2px; }
        .search-wrap { position: relative; }

        .search-box {
            width: 100%;
            background: rgba(18, 20, 26, 0.9);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: .72rem;
            padding: 9px 30px 9px 34px;
            outline: 0;
            transition: border-color .3s ease, box-shadow .3s ease;
            border-radius: 6px;
            letter-spacing: .005em;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.22);
        }

        .search-box::placeholder { color: var(--text-ghost); font-weight: 300; font-style: italic; opacity: 0.85; }
        .search-box:focus { border-color: var(--accent-copper); box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.22), 0 0 0 3px rgba(201, 149, 108, 0.1); }

        .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all .2s;
            opacity: 0;
            pointer-events: none;
        }
        .search-clear.visible { opacity: .6; pointer-events: auto; }
        .search-clear:hover { opacity: 1; color: var(--accent-rose); }

        .sb-gold-line {
            height: 1px;
            margin: 10px 0 0;
            background: linear-gradient(90deg, transparent, rgba(201, 149, 108, 0.2), transparent);
            position: relative;
            z-index: 1;
        }

        .sb-controls { padding-top: 16px; position: relative; z-index: 1; flex: 1; }
        
        .sb-group { position: relative; }
        .sb-group + .sb-group {
            padding-top: 14px;
            margin-top: 14px;
            border-top: 1px solid rgba(201, 149, 108, 0.08);
        }

        .sb-group-label {
            font-family: var(--font-display);
            font-size: .65rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(201, 149, 108, 0.65);
            letter-spacing: .04em;
            margin-bottom: 8px;
            display: block;
        }

        .time-section {
            background: linear-gradient(180deg, rgba(201, 149, 108, 0.03) 0%, transparent 100%);
            border: 1px solid rgba(201, 149, 108, 0.1);
            border-radius: 7px;
            padding: 11px 13px;
            position: relative;
            overflow: hidden;
        }

        .time-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 149, 108, 0.2), transparent);
        }

        .time-range {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: .65rem;
            color: rgba(201, 149, 108, 0.85);
            font-weight: 400;
            margin-bottom: 6px;
            font-variant-numeric: tabular-nums;
            letter-spacing: .01em;
        }

        .time-slider-wrap { position: relative; height: 14px; margin-bottom: 5px; }

        .time-track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-50%);
            border-radius: 1px;
        }

        .time-fill {
            position: absolute;
            top: 50%;
            height: 1px;
            background: var(--accent-copper);
            transform: translateY(-50%);
            border-radius: 1px;
            pointer-events: none;
            transition: left .05s, width .05s;
            opacity: .5;
        }
        .time-fill.active { opacity: .9; box-shadow: 0 0 10px rgba(201, 149, 108, 0.2); }

        .time-slider-wrap input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            margin: 0;
            outline: none;
            pointer-events: none;
            z-index: 2;
        }

        .time-slider-wrap input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            pointer-events: all;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-copper);
            border: none;
            cursor: ew-resize;
            box-shadow: 0 0 8px rgba(201, 149, 108, 0.4);
            transition: box-shadow .2s, transform .15s;
        }
        
        .time-stats {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: var(--font-mono);
            font-size: .45rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }
        .time-stats .ts-count { color: var(--accent-copper); font-weight: 500; font-size: .58rem; }

        .toggle-group { display: flex; flex-direction: column; gap: 1px; }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: .62rem;
            color: var(--text-secondary);
            transition: all .2s ease;
            padding: 4px 7px;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .toggle-item:hover { color: var(--text-primary); background: rgba(201, 149, 108, 0.04); }
        .toggle-item input { display: none; }

        .checkmark {
            width: 12px;
            height: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0;
            border-radius: 2px;
        }

        .toggle-item input:checked ~ .checkmark {
            border-color: rgba(201, 149, 108, 0.6);
            background: rgba(201, 149, 108, 0.12);
        }

        .toggle-item input:checked ~ .checkmark::after {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent-copper);
            opacity: 1;
        }
        
        .toggle-item.disabled { opacity: .2; pointer-events: none; }
        .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        /* Category Legend */
        .category-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 8px;
            margin-top: 4px;
        }

        .cat-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .58rem;
            color: var(--text-secondary);
            padding: 2px 4px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .15s;
        }

        .cat-legend-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .cat-legend-item.dimmed {
            opacity: 0.25;
        }

        .cat-legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Search Dropdown */
        .search-dropdown {
            position: fixed;
            z-index: 500;
            background: rgba(31, 35, 45, 0.98);
            backdrop-filter: blur(36px);
            border: 1px solid var(--border-medium);
            border-left: 2px solid var(--accent-copper);
            border-radius: 8px;
            box-shadow: var(--shadow-lg), -12px 0 32px -16px rgba(201, 149, 108, 0.45);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height .35s cubic-bezier(.22, 1, .36, 1), opacity .2s ease;
            pointer-events: none;
            width: 360px;
        }
        .search-dropdown.open { max-height: 400px; opacity: 1; pointer-events: auto; }

        .search-dropdown-inner {
            max-height: 350px;
            overflow-y: auto;
            padding: 4px 4px;
        }

        .search-result {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            padding: 8px 8px;
            cursor: pointer;
            transition: all .15s ease;
            border-radius: 5px;
            border: 1px solid transparent;
        }
        .search-result:hover { background: rgba(201, 149, 108, 0.04); border-color: rgba(201, 149, 108, 0.12); }
        .search-result.active { background: rgba(201, 149, 108, 0.1); border-color: rgba(201, 149, 108, 0.3); }

        .sr-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .sr-body { flex: 1; min-width: 0; padding-top: 1px; }
        .sr-name {
            font-family: var(--font-display);
            font-size: .75rem;
            color: var(--text-primary);
            font-style: italic;
        }
        .sr-category {
            font-family: var(--font-mono);
            font-size: .52rem;
            color: var(--text-muted);
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        /* Tooltip — Oxford gilt edge */
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(31, 35, 45, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-medium);
            border-left: 2px solid var(--accent-copper);
            padding: 14px 16px;
            width: 260px;
            pointer-events: none;
            z-index: 100;
            box-shadow: var(--shadow-lg), -12px 0 32px -16px rgba(201, 149, 108, 0.45);
            border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
        }

        .tt-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .tt-cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .tt-category {
            font-family: var(--font-mono);
            font-size: .55rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .1em;
        }

        .tt-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-style: italic;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .tt-desc { font-size: .68rem; color: var(--text-secondary); line-height: 1.55; }
        
        .tt-meta {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 12px;
        }

        .tt-stat {
            font-family: var(--font-mono);
            font-size: .52rem;
            color: var(--text-muted);
        }
        .tt-stat-value {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Loading */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-void);
            z-index: 200;
            transition: opacity .8s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-dots { display: flex; gap: 7px; }
        .loader-dots span {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--accent-copper);
            opacity: .25;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: .16s; }
        .loader-dots span:nth-child(3) { animation-delay: .32s; }
        @keyframes dotPulse { 0%, 80%, 100% { opacity: .25; transform: scale(.8); } 40% { opacity: 1; transform: scale(1.3); } }
        .loader-text { font-family: var(--font-mono); font-size: .55rem; color: var(--text-secondary); margin-top: 20px; text-transform: uppercase; letter-spacing: .25em; }

        /* ═══════ DETAIL PANEL — read-only node content view ═══════ */
        aside.detail-panel {
            background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg-void) 100%);
            border-left: 1px solid var(--border-medium);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s ease;
        }

        body.detail-open aside.detail-panel {
            opacity: 1;
            pointer-events: auto;
        }

        /* Slim copper-tinted scrollbar for the reading pane */
        aside.detail-panel::-webkit-scrollbar { width: 6px; }
        aside.detail-panel::-webkit-scrollbar-track { background: transparent; }
        aside.detail-panel::-webkit-scrollbar-thumb { background: rgba(201, 149, 108, 0.16); border-radius: 3px; }
        aside.detail-panel::-webkit-scrollbar-thumb:hover { background: rgba(201, 149, 108, 0.4); }

        .dp-header {
            padding: 24px 22px 18px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .dp-close {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2; /* paint above .dp-header so the click target isn't covered */
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all .2s;
            line-height: 1;
        }
        .dp-close:hover { color: var(--accent-rose); background: rgba(196, 125, 138, 0.08); }

        .dp-cat-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 10px;
        }
        .dp-cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dp-category {
            font-family: var(--font-mono);
            font-size: .58rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .12em;
        }

        .dp-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-style: italic;
            font-weight: 400;
            color: var(--text-primary);
            line-height: 1.15;
            margin-bottom: 12px;
            padding-right: 32px;
        }

        .dp-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .dp-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-mono);
            font-size: .56rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);

        }
        .dp-badge .dp-badge-key { color: var(--text-muted); text-transform: uppercase; }
        .dp-badge .dp-badge-val { color: var(--accent-copper-light); }
        .dp-badge.dp-layer .dp-badge-val { color: var(--accent-plum); }
        .dp-badge.dp-conf .dp-badge-val { color: var(--accent-sage); }

        .dp-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 22px 28px;
        }

        .dp-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;

        .dp-tag {
            font-family: var(--font-mono);
            font-size: .55rem;
            color: var(--text-muted);
            background: rgba(201, 149, 108, 0.06);
            border: 1px solid rgba(201, 149, 108, 0.12);
            border-radius: 3px;
            padding: 2px 7px;
            letter-spacing: .02em;
        }

        /* Collapsible sections — mirrors edit.html behavior */
        .dp-section { margin-bottom: 6px; }
        .dp-section.collapsed > *:not(.dp-section-title) { display: none; }
        .dp-section.collapsed .dp-section-title { margin-bottom: 0; border-bottom: none; }
        .dp-section.collapsed .dp-section-title::after { transform: rotate(-90deg); }

        .dp-section-title {
            font-family: var(--font-display);
            font-size: .82rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text-primary);
            cursor: pointer;
            padding-bottom: 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: color .2s;
        }
        .dp-section-title::after {
            content: '▾';
            margin-left: auto;
            font-size: .65rem;
            color: var(--text-muted);
            transition: transform .2s;
        }
        .dp-section-title:hover { color: var(--accent-copper-light); }

        .dp-section-count {
            font-family: var(--font-mono);
            font-size: .56rem;
            font-style: normal;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 1px 7px;
        }

        .dp-field { margin-bottom: 14px; }
        .dp-field:last-child { margin-bottom: 0; }
        .dp-field-label {
            display: block;
            font-family: var(--font-mono);
            font-size: .55rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 5px;
        }
        .dp-field-value {
            font-family: var(--font-body);
            font-size: .78rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .dp-field-value.dp-prose { white-space: pre-wrap; }

        /* Chronology events */
        .dp-event {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-left: 2px solid rgba(201, 149, 108, 0.3);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .dp-event-year {
            font-family: var(--font-mono);
            font-size: .68rem;
            color: var(--accent-copper);
            font-weight: 500;
            margin-bottom: 3px;
        }
        .dp-event-name {
            font-family: var(--font-body);
            font-size: .74rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .dp-event-context {
            font-family: var(--font-body);
            font-size: .68rem;
            color: var(--text-muted);
            line-height: 1.5;
            font-style: italic;
        }

        /* Relationships */
        .dp-rel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all .2s;
        }
        .dp-rel:hover {
            border-color: rgba(201, 149, 108, 0.25);
            background: rgba(201, 149, 108, 0.04);
            transform: translateX(2px);
        }
        .dp-rel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;

        .dp-rel-type {
            font-family: var(--font-mono);
            font-size: .56rem;
            color: var(--accent-copper);
            text-transform: uppercase;
            letter-spacing: .06em;
            background: rgba(201, 149, 108, 0.1);
            padding: 2px 7px;
            border-radius: 3px;

        .dp-rel-arrow { color: var(--text-ghost); font-size: .68rem; }
        .dp-rel-target {
            font-family: var(--font-display);
            font-size: .82rem;
            font-style: italic;
            color: var(--text-primary);
        }
        .dp-rel-target.missing { color: var(--accent-rose); font-style: normal; font-family: var(--font-mono); font-size: .68rem; }
        .dp-rel-family {
            font-family: var(--font-mono);
            font-size: .52rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .dp-rel-desc {
            font-family: var(--font-body);
            font-size: .68rem;
            color: var(--text-muted);
            margin-top: 5px;
            line-height: 1.5;
        }

        /* Specific properties — recursive key/value rendering */
        .dp-kv {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-bottom: 6px;
        }
        .dp-kv-key {
            font-family: var(--font-mono);
            font-size: .56rem;
            color: var(--accent-plum);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 4px;
        }
        .dp-kv-val {
            font-family: var(--font-body);
            font-size: .74rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }
        .dp-kv-val ul { padding-left: 16px; margin: 4px 0 0; }
        .dp-kv-val li { margin-bottom: 2px; }

        /* Metadata */
        .dp-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 14px;
            margin-bottom: 12px;
        }
        .dp-audit-entry {
            background: rgba(0, 0, 0, 0.15);

            border-radius: var(--radius-sm);
            padding: 8px 10px;
            margin-bottom: 6px;

        .dp-audit-date {
            font-family: var(--font-mono);
            font-size: .56rem;
            color: var(--accent-copper);
            margin-bottom: 3px;
        }
        .dp-audit-note {
            font-family: var(--font-body);
            font-size: .7rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* References */
        .dp-ref {
            background: rgba(0, 0, 0, 0.2);

            margin-bottom: 8px;

        .dp-ref-desc {
            font-family: var(--font-body);
            font-size: .68rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Empty state */
        .dp-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            text-align: center;
            padding: 40px 24px;
            color: var(--text-muted);
        }
        .dp-empty-icon {
            font-family: var(--font-display);
            font-size: 3.2rem;
            font-style: italic;

        }

            font-family: var(--font-display);
            font-size: .9rem;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 220px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
