    <script>
        /* ═══════ UTILITIES ═══════ */
        function hexToRGBA(hex, alpha) {
            if (!hex || typeof hex !== 'string') return `rgba(136,136,136,${alpha})`;
            if (hex.startsWith('rgb')) return hex;
            if (!hex.startsWith('#')) hex = '#' + hex;
            const hexMatch = hex.match(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
            if (!hexMatch) return `rgba(136,136,136,${alpha})`;
            let r, g, b;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else {
                r = parseInt(hex.slice(1, 3), 16);
                g = parseInt(hex.slice(3, 5), 16);
                b = parseInt(hex.slice(5, 7), 16);
            }
            if (isNaN(r) || isNaN(g) || isNaN(b)) return `rgba(136,136,136,${alpha})`;
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
        function isFiniteNum(v) { return typeof v === 'number' && isFinite(v); }

        /* ═══════ OXFORD COMMON ROOM — COMMUNITY PALETTE ═══════ */
        /* The Senior Common Room: muted, low-saturation scholarly tones.
           All colours sit at ~10-25% saturation, 20-35% lightness — velvet buttons on dark wool. */
        var COMMUNITY_COLORS = [
            '#3D5A5C', // 1: Faded teal – old copper roofs
            '#704E4A', // 2: Dusty burgundy leather
            '#4A4B5C', // 3: Deep slate blue (academic gown)
            '#5C5A3D', // 4: Olive – aged parchment
            '#4E4A60', // 5: Muted plum
            '#5C4E3D', // 6: Warm dark oak
            '#3D4E5C', // 7: Desaturated navy
            '#4E5C4A', // 8: Moss
            '#4A4A4E', // 9: Charcoal
            '#5C574E', // 10: Taupe
            '#3D5C57', // 11: Petrol
            '#5C4E54'  // 12: Muted maroon
        ];

        var FALLBACK_COLOR = COMMUNITY_COLORS[8]; // charcoal

        /* Map each category deterministically to a community colour (hash → index).
           Keeps colour stable across reloads and decouples from the fixed category list. */
        var _categoryColorCache = {};
        function categoryColorIndex(category) {
            if (!category) return 8;
            if (_categoryColorCache[category] !== undefined) return _categoryColorCache[category];
            var h = 2166136261;
            for (var i = 0; i < category.length; i++) {
                h ^= category.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            var idx = Math.abs(h) % COMMUNITY_COLORS.length;
            _categoryColorCache[category] = idx;
            return idx;
        }

        function getCategoryColor(category) {
            if (!category || typeof category !== 'string') return FALLBACK_COLOR;
            return COMMUNITY_COLORS[categoryColorIndex(category)];
        }

        /* Legacy alias used by older index.html callsites (category legend, etc.) */
        function catColor(cat) { return getCategoryColor(cat); }

        /* ═══════ STATE ═══════ */
        var nodes = [], gE = [], nM = {};
        var alpha = 1;
        var cam = { x: 0, y: 0, z: 1 }, camTgt = null;
        var hovN = null, selN = null, dragN = null;
        var isPan = false, panS = { x: 0, y: 0 };
        var W = 0, H = 0;
        var tR = { min: -Infinity, max: Infinity }, tRF = { min: 0, max: 0 };
        var dLoaded = false;
        var activeCategories = new Set();
        var catVisibility = {};

        var canvas = document.getElementById('graph-canvas'), ctx = canvas.getContext('2d');

        /* ═══════ SIMULATION CONSTANTS ═══════ */
        /* Aligned with edit.html Oxford layout (REPULSION=280, LINK_DISTANCE=100).
           Category-center gravity retained from index.html for silhouette clustering. */
        var REP = 280, SL = 100, SS = 0.008, CC2 = 0.006, CG = 0.0005, AS = 0.003, DR = 0.6;
        var ALPHA_DECAY = 0.995;

        /* ═══════ OXFORD LAYERING STATE ═══════ */
        /* Per-node importance metrics + label tiers (recomputed when graph changes) */
        var maxDegree = 1;
        var nodeDegrees = {};      // id -> degree
        var labelTiers = {};       // id -> 'always' | 'meso' | 'micro'
        var TIER_ALWAYS_FRAC = 0.03; // top 3% hubs
        var TIER_MESO_FRAC = 0.10;   // top 10%

        /* Label fade opacity (animated across zoom-band thresholds) */
        var labelOpacity = {};     // id -> current opacity

        /* Viewport coverage metric: visible world-width / full graph width.
           Macro ≈ 1.0, Meso ≈ 0.3–0.6, Micro < 0.2 */
        var viewportCoverage = 1.0;

        /* Offscreen canvas for community silhouettes (recomputed on layout change) */
        var silhouetteCanvas = null, silhouetteCtx = null;
        var silhouetteDirty = true;

        /* Pre-computed hulls: { colorIndex: [{x,y}, ...] } */
        var communityHulls = {};

        /* Pre-computed edge weights for progressive filtering */
        var edgeWeights = null, maxEdgeWeight = 1;

        /* ═══════ VIEW HELPERS ═══════ */
        function sCV() {
            var r = canvas.parentElement.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * devicePixelRatio;
            canvas.height = H * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }

        function resize() { sCV(); if (dLoaded) fitCamera(false); }

        /* Compute the target (z, x, y) that fits the whole graph. */
        function computeFitTarget() {
            var v = nodes.filter(function (n) { return n.visible; });
            if (!v.length) return { x: 0, y: 0, z: 1 };
            var x1 = Infinity, x2 = -Infinity, y1 = Infinity, y2 = -Infinity;
            v.forEach(function (n) {
                if (n.x < x1) x1 = n.x;
                if (n.x > x2) x2 = n.x;
                if (n.y < y1) y1 = n.y;
                if (n.y > y2) y2 = n.y;
            });
            if (x1 === Infinity) return { x: 0, y: 0, z: 1 };
            var p = 80, gw = Math.max(1, x2 - x1 + p * 2), gh = Math.max(1, y2 - y1 + p * 2);
            var z = Math.min(W / gw, H / gh, 1.5);
            return { z: z, x: W / 2 - ((x1 + x2) / 2) * z, y: H / 2 - ((y1 + y2) / 2) * z };
        }

        /* Fit camera, optionally snapping instantly (no tween). */
        function fitCamera(snap) {
            var t = computeFitTarget();
            if (snap) {
                cam.x = t.x; cam.y = t.y; cam.z = t.z;
                camTgt = null;
            } else {
                tweenCamera(t.x, t.y, t.z, 600);
            }
        }

        /* Legacy index.html name preserved for older call sites. */
        function fCam() { fitCamera(true); }

        /* Camera tween (cubic-bezier ease over ~600ms) */
        function tweenCamera(toX, toY, toZ, duration) {
            duration = duration || 600;
            camTgt = { from: { x: cam.x, y: cam.y, z: cam.z }, to: { x: toX, y: toY, z: toZ }, start: performance.now(), duration: duration };
        }

        function updateCameraTween(now) {
            if (!camTgt || !camTgt.from) {
                /* Legacy smooth-approach tween (used by pTN). */
                if (!camTgt) return;
                uCPLegacy();
                return;
            }
            var t = clamp((now - camTgt.start) / camTgt.duration, 0, 1);
            var e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            cam.x = camTgt.from.x + (camTgt.to.x - camTgt.from.x) * e;
            cam.y = camTgt.from.y + (camTgt.to.y - camTgt.from.y) * e;
            cam.z = camTgt.from.z + (camTgt.to.z - camTgt.from.z) * e;
            if (t >= 1) camTgt = null;
        }

        /* Legacy exponential-approach tween (for pTN node-focus animation). */
        function uCPLegacy() {
            if (!camTgt || !camTgt.from) return; /* not a legacy tween */
            var dx = camTgt.x - cam.x, dy = camTgt.y - cam.y, dz = camTgt.z - cam.z;
            if (Math.abs(dx) < .2 && Math.abs(dy) < .2 && Math.abs(dz) < .0005) {
                cam.x = camTgt.x; cam.y = camTgt.y; cam.z = camTgt.z;
                camTgt = null; return;
            }
            cam.x += dx * .08;
            cam.y += dy * .08;
            cam.z += dz * .08;
        }

        /* Fly to a node, easing it to the centre over ~600ms. */
        function pTN(nd) {
            if (!nd) return;
            var tz = Math.max(cam.z, 1.3);
            tweenCamera(W / 2 - nd.x * tz, H / 2 - nd.y * tz, tz, 600);
        }

        function w2s(wx, wy) { return { x: wx * cam.z + cam.x, y: wy * cam.z + cam.y }; }
        function s2w(sx, sy) { return { x: (sx - cam.x) / cam.z, y: (sy - cam.y) / cam.z }; }

        /* ═══════ VIEWPORT COVERAGE (semantic zoom band metric) ═══════ */
        function computeViewportCoverage() {
            var v = nodes.filter(function (n) { return n.visible; });
            if (!v.length) { viewportCoverage = 1; return; }
            var minX = Infinity, maxX = -Infinity;
            v.forEach(function (n) { if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x; });
            var graphW = Math.max(1, maxX - minX);
            var visW = W / cam.z;
            viewportCoverage = clamp(visW / graphW, 0, 2);
        }

        function zoomBand() {
            if (viewportCoverage > 0.7) return 'macro';
            if (viewportCoverage > 0.2) return 'meso';
            return 'micro';
        }

        /* ═══════ CONTEXTUAL LINKS ═══════ */
        function getConnectedNodes(node) {
            if (!node) return { nodes: new Set(), edges: new Set() };
            var connected = new Set([node.id]);
            var edges = new Set();
            gE.forEach(function (e) {
                if (!e.visible) return;
                if (e.source === node.id || e.target === node.id) {
                    connected.add(e.source);
                    connected.add(e.target);
                    edges.add(e);
                }
            });
            return { nodes: connected, edges: edges };
        }

        /* ═══════ GRAPH METRICS & LABEL TIERS ═══════ */
        function computeMetrics() {
            nodeDegrees = {};
            gE.forEach(function (e) {
                if (!e.visible) return;
                nodeDegrees[e.source] = (nodeDegrees[e.source] || 0) + 1;
                nodeDegrees[e.target] = (nodeDegrees[e.target] || 0) + 1;
            });
            nodes.forEach(function (n) {
                if (nodeDegrees[n.id] === undefined) nodeDegrees[n.id] = (n.degree || 0);
            });
            var degs = nodes.map(function (n) { return nodeDegrees[n.id] || 0; }).sort(function (a, b) { return b - a; });
            maxDegree = degs.length ? Math.max(1, degs[0]) : 1;

            /* Assign tiers by percentile rank */
            var n = nodes.length;
            var alwaysCutoff = n > 100 ? Math.ceil(n * TIER_ALWAYS_FRAC) : (n > 0 ? 1 : 0);
            var mesoCutoff = Math.ceil(n * TIER_MESO_FRAC);
            var sorted = nodes.slice().sort(function (a, b) { return (nodeDegrees[b.id] || 0) - (nodeDegrees[a.id] || 0); });
            labelTiers = {};
            sorted.forEach(function (node, i) {
                if (i < alwaysCutoff) labelTiers[node.id] = 'always';
                else if (i < mesoCutoff) labelTiers[node.id] = 'meso';
                else labelTiers[node.id] = 'micro';
            });
            /* Initialize label opacity */
            nodes.forEach(function (node) {
                if (labelOpacity[node.id] === undefined) labelOpacity[node.id] = 0;
            });
        }

        /* Degree-based radius mapping: min 3px, max 18px (world units, pre-zoom). */
        function nodeRadius(n) {
            var deg = nodeDegrees[n.id] || n.degree || 0;
            var t = maxDegree > 0 ? deg / maxDegree : 0;
            return clamp(3 + t * 15, 3, 18);
        }

        /* ═══════ CONVEX HULL (Andrew's monotone chain) ═══════ */
        function convexHull(points) {
            if (points.length < 3) return points.slice();
            var pts = points.slice().sort(function (a, b) { return a.x - b.x || a.y - b.y; });
            var cross = function (O, A, B) { return (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x); };
            var lower = [];
            for (var i = 0; i < pts.length; i++) {
                var p = pts[i];
                while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
                lower.push(p);
            }
            var upper = [];
            for (var j = pts.length - 1; j >= 0; j--) {
                var p2 = pts[j];
                while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p2) <= 0) upper.pop();
                upper.push(p2);
            }
            lower.pop(); upper.pop();
            return lower.concat(upper);
        }

        /* ═══════ COMMUNITY SILHOUETTES (offscreen, blurred clouds) ═══════ */
        function computeHulls() {
            var groups = {};
            nodes.forEach(function (n) {
                if (!n.visible) return;
                var ci = categoryColorIndex(n.category);
                if (!groups[ci]) groups[ci] = [];
                groups[ci].push({ x: n.x, y: n.y });
            });
            communityHulls = {};
            Object.keys(groups).forEach(function (ci) {
                communityHulls[ci] = convexHull(groups[ci]);
            });
        }

        function renderSilhouettes() {
            if (!silhouetteCanvas) {
                silhouetteCanvas = document.createElement('canvas');
                silhouetteCtx = silhouetteCanvas.getContext('2d');
            }
            var vis = nodes.filter(function (n) { return n.visible; });
            if (!vis.length) { silhouetteCanvas.width = 1; silhouetteCanvas.height = 1; return; }
            var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            vis.forEach(function (n) { if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x; if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y; });
            var pad = 120;
            var bw = Math.max(1, maxX - minX + pad * 2);
            var bh = Math.max(1, maxY - minY + pad * 2);
            silhouetteCanvas.width = Math.min(bw, 4000);
            silhouetteCanvas.height = Math.min(bh, 4000);
            var sc = silhouetteCtx;
            sc.clearRect(0, 0, silhouetteCanvas.width, silhouetteCanvas.height);

            var ox = -minX + pad, oy = -minY + pad;
            sc.filter = 'blur(70px)';
            Object.keys(communityHulls).forEach(function (ci) {
                var hull = communityHulls[ci];
                if (!hull || hull.length < 2) return;
                sc.beginPath();
                sc.moveTo(hull[0].x + ox, hull[0].y + oy);
                for (var i = 1; i < hull.length; i++) sc.lineTo(hull[i].x + ox, hull[i].y + oy);
                sc.closePath();
                sc.fillStyle = hexToRGBA(COMMUNITY_COLORS[ci % COMMUNITY_COLORS.length], 0.08);
                sc.fill();
            });
            sc.filter = 'none';
        }

        /* ═══════ EDGE VISIBILITY (progressive filtering by zoom band) ═══════ */
        function computeEdgeWeights() {
            edgeWeights = new Array(gE.length);
            var mw = 1;
            for (var i = 0; i < gE.length; i++) {
                var e = gE[i];
                var w = (nodeDegrees[e.source] || 0) + (nodeDegrees[e.target] || 0);
                edgeWeights[i] = w;
                if (w > mw) mw = w;
            }
            maxEdgeWeight = mw;
        }

        function edgeShouldShow(i, band) {
            var w = edgeWeights[i];
            if (band === 'macro') return w >= maxEdgeWeight * 0.95;       // top 5%
            if (band === 'meso') {
                var e = gE[i];
                var ts = labelTiers[e.source] !== 'micro' || labelTiers[e.target] !== 'micro';
                return ts || w >= maxEdgeWeight * 0.9;
            }
            return true; // micro: all edges
        }

        /* ═══════ LABEL VISIBILITY (tier + band + hover/selected) ═══════ */
        function labelTargetOpacity(n, band) {
            var tier = labelTiers[n.id] || 'micro';
            if (n === hovN || n === selN) return 1;
            if (tier === 'always') return 1;
            if (tier === 'meso' && (band === 'meso' || band === 'micro')) return 0.85;
            if (tier === 'micro' && band === 'micro') return 0.7;
            return 0;
        }

        /* ═══════ FORCE SIMULATION ═══════ */
        function simTick() {
            var vis = nodes.filter(function (n) { return n.visible && !n.pinned; });
            if (!vis.length) return;
            alpha *= ALPHA_DECAY;
            if (alpha < 0.001) alpha = 0.001;
            var i, j, n = vis.length;

            /* Repulsion */
            for (i = 0; i < n; i++) {
                var a = vis[i];
                var fx = 0, fy = 0;
                for (j = 0; j < n; j++) {
                    if (i === j) continue;
                    var b = vis[j];
                    var dx = a.x - b.x, dy = a.y - b.y;
                    var d2 = dx * dx + dy * dy;
                    if (d2 < 1) continue;
                    var d = Math.sqrt(d2);
                    if (d < REP) { var f = (REP - d) / d * SS * alpha; fx += dx * f; fy += dy * f; }
                }
                a.vx = (a.vx || 0) + fx;
                a.vy = (a.vy || 0) + fy;
            }

            /* Category Center Gravity (index.html feature — improves silhouette clustering) */
            var cxs = {}, cys = {}, ccs = {};
            vis.forEach(function (nd) {
                var c = nd.category;
                if (!cxs[c]) { cxs[c] = 0; cys[c] = 0; ccs[c] = 0; }
                cxs[c] += nd.x; cys[c] += nd.y; ccs[c]++;
            });
            vis.forEach(function (nd) {
                var c = nd.category;
                var cnt = Math.max(1, ccs[c] || 1);
                var ccx = cxs[c] / cnt, ccy = cys[c] / cnt;
                nd.vx = (nd.vx || 0) + (ccx - nd.x) * CC2 * alpha;
                nd.vy = (nd.vy || 0) + (ccy - nd.y) * CC2 * alpha;
            });

            /* Edges */
            gE.forEach(function (e) {
                if (!e.visible) return;
                var s = nM[e.source], t = nM[e.target];
                if (!s || !t) return;
                var dx = t.x - s.x, dy = t.y - s.y;
                var d = Math.sqrt(dx * dx + dy * dy);
                if (d < 1) return;
                var f = (d - SL) / d * AS * alpha;
                if (!s.pinned) { s.vx = (s.vx || 0) + dx * f; s.vy = (s.vy || 0) + dy * f; }
                if (!t.pinned) { t.vx = (t.vx || 0) - dx * f; t.vy = (t.vy || 0) - dy * f; }
            });

            /* Center gravity */
            vis.forEach(function (nd) {
                nd.vx = (nd.vx || 0) - nd.x * CG * alpha;
                nd.vy = (nd.vy || 0) - nd.y * CG * alpha;
            });

            /* Apply Velocity */
            vis.forEach(function (nd) {
                nd.vx *= DR; nd.vy *= DR;
                nd.x += nd.vx; nd.y += nd.vy;
                if (!isFiniteNum(nd.x)) nd.x = (Math.random() - 0.5) * 100;
                if (!isFiniteNum(nd.y)) nd.y = (Math.random() - 0.5) * 100;
            });
        }

        /* ═══════ DRAWING — Oxford layered pipeline ═══════ */
        /* Layers: (1) silhouettes → (2) edges → (3) nodes → (4) labels.
           Depth by shadow not glow; matte velvet nodes; faint graphite threads. */
        function draw() {
            var now = performance.now();
            updateCameraTween(now);
            computeViewportCoverage();
            var band = zoomBand();
            var showFlow = document.getElementById('lens-flow').checked;
            var showSilhouettes = document.getElementById('lens-hulls').checked;
            var showHullOutlines = document.getElementById('lens-heatmap').checked;
            var showCent = document.getElementById('lens-centrality').checked;
            var showConfCol = document.getElementById('lens-confidence-color').checked;
            var showObs = document.getElementById('lens-observability').checked;

            /* Recompute silhouettes when layout has shifted substantially */
            if (silhouetteDirty) {
                computeHulls();
                if (showSilhouettes) renderSilhouettes();
                silhouetteDirty = false;
            }
            /* Recompute edge weights if structure changed */
            if (edgeWeights === null || edgeWeights.length !== gE.length) computeEdgeWeights();

            ctx.clearRect(0, 0, W, H);

            /* ── LAYER 0: Category hull outlines (legacy heatmap lens) ── */
            if (showHullOutlines) drawHullOutlines();

            /* ── LAYER 1: Community silhouettes (background clouds) ── */
            if (showSilhouettes) {
                var silhouetteAlpha = band === 'macro' ? 1 : band === 'meso' ? 0.5 : 0.15;
                if (silhouetteCanvas && silhouetteCanvas.width > 1 && silhouetteAlpha > 0 && nodes.length) {
                    var vis = nodes.filter(function (n) { return n.visible; });
                    if (vis.length) {
                        var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                        vis.forEach(function (n) { if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x; if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y; });
                        var pad = 120;
                        var tlx = (minX - pad) * cam.z + cam.x;
                        var tly = (minY - pad) * cam.z + cam.y;
                        var sw = silhouetteCanvas.width * cam.z;
                        var sh = silhouetteCanvas.height * cam.z;
                        ctx.globalAlpha = silhouetteAlpha;
                        ctx.drawImage(silhouetteCanvas, tlx, tly, sw, sh);
                        ctx.globalAlpha = 1;
                    }
                }
            }

            /* ── LAYER 2: Edges (midground, drawn before nodes) ── */
            drawEdgesOxford(band, showFlow);

            /* ── LAYER 3: Nodes (foreground, matte velvet) ── */
            drawNodesOxford(band, showCent, showConfCol, showObs);

            /* ── LAYER 4: Labels (parchment text with protective dark mask) ── */
            drawLabelsOxford(band);
        }

        /* Legacy hull outlines (heatmap lens) — radial gradient fills + strokes. */
        function drawHullOutlines() {
            var catC = {};
            nodes.forEach(function (n) {
                if (!n.visible) return;
                if (!catC[n.category]) catC[n.category] = [];
                catC[n.category].push(n);
            });
            Object.keys(catC).forEach(function (cat) {
                var pts = catC[cat];
                if (pts.length < 3) return;
                var sPts = pts.map(function (p) { return w2s(p.x, p.y); });
                var cx = 0, cy = 0;
                sPts.forEach(function (p) { cx += p.x; cy += p.y; });
                cx /= sPts.length; cy /= sPts.length;
                sPts.sort(function (a, b) {
                    return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx);
                });
                ctx.beginPath();
                ctx.moveTo(sPts[0].x, sPts[0].y);
                for (var i = 1; i < sPts.length; i++) ctx.lineTo(sPts[i].x, sPts[i].y);
                ctx.closePath();
                var hullCol = getCategoryColor(cat);
                var hgrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180);
                hgrd.addColorStop(0, hexToRGBA(hullCol, 0.035));
                hgrd.addColorStop(1, hexToRGBA(hullCol, 0));
                ctx.fillStyle = hgrd;
                ctx.fill();
                ctx.strokeStyle = hexToRGBA(hullCol, 0.1);
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }

        function drawEdgesOxford(band, showFlow) {
            var context = getConnectedNodes(selN || hovN);
            var hasContext = (selN || hovN) !== null;

            ctx.lineCap = 'round';
            for (var i = 0; i < gE.length; i++) {
                var e = gE[i];
                if (!e.visible) continue;
                /* Progressive filtering by zoom band when flow lens is on */
                if (showFlow && !edgeShouldShow(i, band) && !hasContext) continue;

                var s = nM[e.source], t = nM[e.target];
                if (!s || !t) continue;
                var ss = w2s(s.x, s.y), ts = w2s(t.x, t.y);

                var w = edgeWeights[i];
                var baseOpacity = clamp((w / maxEdgeWeight) * 0.3, 0.1, 0.3);

                var incident = (hovN && (hovN.id === e.source || hovN.id === e.target)) ||
                               (selN && (selN.id === e.source || selN.id === e.target));

                var strokeStyle, lineWidth;
                if (incident) {
                    var ref = hovN || selN;
                    var tint = getCategoryColor(ref.category);
                    strokeStyle = hexToRGBA(tint, 0.6);
                    lineWidth = clamp(1.0 * cam.z, 0.6, 1.6);
                } else if (hasContext) {
                    /* Dim non-incident edges when a node is focused */
                    strokeStyle = hexToRGBA('#4a4a4a', 0.05);
                    lineWidth = clamp(0.5 * cam.z, 0.3, 1.0);
                } else if (hovN) {
                    strokeStyle = hexToRGBA('#4a4a4a', 0.05);
                    lineWidth = clamp(0.5 * cam.z, 0.3, 1.0);
                } else {
                    strokeStyle = hexToRGBA('#4a4a4a', baseOpacity);
                    lineWidth = clamp(0.75 * cam.z, 0.4, 1.2);
                }

                ctx.beginPath();
                ctx.moveTo(ss.x, ss.y);
                ctx.lineTo(ts.x, ts.y);
                ctx.strokeStyle = strokeStyle;
                ctx.lineWidth = lineWidth;
                ctx.stroke();

                /* Directional indicator for incident edges (index.html feature) */
                if (incident) {
                    var mx = (ss.x + ts.x) / 2, my = (ss.y + ts.y) / 2;
                    var angle = Math.atan2(ts.y - ss.y, ts.x - ss.x);
                    var arrowCol = getCategoryColor((hovN || selN).category);
                    ctx.fillStyle = hexToRGBA(arrowCol, 0.7);
                    ctx.beginPath();
                    ctx.moveTo(mx + Math.cos(angle) * 4, my + Math.sin(angle) * 4);
                    ctx.lineTo(mx + Math.cos(angle + 2.5) * 3, my + Math.sin(angle + 2.5) * 3);
                    ctx.lineTo(mx + Math.cos(angle - 2.5) * 3, my + Math.sin(angle - 2.5) * 3);
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }

        function drawNodesOxford(band, showCent, showConfCol, showObs) {
            var context = getConnectedNodes(selN || hovN);
            var hasContext = (selN || hovN) !== null;

            /* First pass: drop shadows for all nodes (lifts them from canvas) */
            ctx.save();
            for (var i0 = 0; i0 < nodes.length; i0++) {
                var n0 = nodes[i0];
                if (!n0.visible) continue;
                var s0 = w2s(n0.x, n0.y);
                var isH0 = hovN === n0, isSel0 = selN === n0;
                var baseR0 = showCent ? nodeRadius(n0) : (5 + (n0.degree || 0) * 0.6);
                var r0 = Math.max(2, baseR0 * cam.z);
                if (s0.x + r0 + 20 < 0 || s0.x - r0 - 20 > W || s0.y + r0 + 20 < 0 || s0.y - r0 - 20 > H) continue;

                var isInContext0 = !hasContext || context.nodes.has(n0.id);
                var ghosted = showObs && !isInContext0;
                var conf0 = n0.confidence || 0.7;
                var ghostAlpha = 1;
                if (ghosted) {
                    if (conf0 < 0.4) ghostAlpha = 0.06;
                    else if (conf0 < 0.65) ghostAlpha = 0.15;
                    else ghostAlpha = (hasContext ? 0.08 : 1);
                } else if (hasContext && !isInContext0) {
                    ghostAlpha = 0.08;
                }
                if (ghostAlpha < 0.05) continue;

                var shadowBlur = isH0 ? 12 : 6;
                var shadowOffset = isH0 ? 4 : 2;
                ctx.shadowColor = 'rgba(0,0,0,' + (isH0 ? 0.7 : 0.5) + ')';
                ctx.shadowBlur = shadowBlur * (cam.z > 1 ? 1 : cam.z);
                ctx.shadowOffsetY = shadowOffset;
                ctx.globalAlpha = ghostAlpha;
                ctx.fillStyle = nodeFillColor(n0, showConfCol);
                ctx.beginPath();
                ctx.arc(s0.x, s0.y, r0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            ctx.globalAlpha = 1;

            /* Second pass: fills + strokes (no shadow) */
            for (var i = 0; i < nodes.length; i++) {
                var n = nodes[i];
                if (!n.visible) continue;
                var s = w2s(n.x, n.y);
                var isH = hovN === n, isSel = selN === n;
                var baseR = showCent ? nodeRadius(n) : (5 + (n.degree || 0) * 0.6);
                var r = Math.max(2, (baseR + (isH ? 1 : 0)) * cam.z);
                if (s.x + r + 20 < 0 || s.x - r - 20 > W || s.y + r + 20 < 0 || s.y - r - 20 > H) continue;

                var isInContext = !hasContext || context.nodes.has(n.id);
                var ghosted2 = showObs && !isInContext;
                var conf = n.confidence || 0.7;
                var alpha2 = 1;
                if (ghosted2) {
                    if (conf < 0.4) alpha2 = 0.06;
                    else if (conf < 0.65) alpha2 = 0.15;
                    else alpha2 = (hasContext ? 0.08 : 1);
                } else if (hasContext && !isInContext) {
                    alpha2 = 0.08;
                }
                if (alpha2 < 0.05) continue;

                var color = nodeFillColor(n, showConfCol);

                ctx.globalAlpha = alpha2;

                /* Matte solid fill — velvet buttons */
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
                ctx.fill();

                /* Hover stroke: faint warm pencil line */
                if (isH && !isSel) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
                /* Selected stroke: thin gilt edge — fine bookbinding */
                if (isSel) {
                    ctx.strokeStyle = '#C4B998';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r + 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }
        }

        /* Resolve a node's fill color (with optional confidence desaturation). */
        function nodeFillColor(n, showConfCol) {
            var col = getCategoryColor(n.category);
            if (showConfCol) {
                var conf = n.confidence || 0.7;
                col = blendWithConfidence(col, conf);
            }
            return col;
        }

        function drawLabelsOxford(band) {
            var context = getConnectedNodes(selN || hovN);
            var hasContext = (selN || hovN) !== null;

            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            for (var i = 0; i < nodes.length; i++) {
                var n = nodes[i];
                if (!n.visible) continue;
                var target = labelTargetOpacity(n, band);
                /* Suppress labels for ghosted/non-context nodes when focusing */
                if (hasContext && !(n === hovN || n === selN) && !context.nodes.has(n.id)) target = 0;

                var cur = labelOpacity[n.id] || 0;
                var next = cur + (target - cur) * 0.15;
                labelOpacity[n.id] = next;
                if (next < 0.02) continue;

                var s = w2s(n.x, n.y);
                var baseR = nodeRadius(n);
                var r = Math.max(2, baseR * cam.z);
                var tier = labelTiers[n.id] || 'micro';
                var weight = tier === 'always' ? 500 : 400;
                var fontSize = clamp(tier === 'always' ? r * 1.3 : r * 1.1, 9, 13);
                ctx.font = weight + ' ' + fontSize + 'px Inter, system-ui, sans-serif';
                var label = n.name || n.id || 'Unknown';
                var maxChars = band === 'macro' ? 14 : 22;
                if (label.length > maxChars) label = label.substring(0, maxChars - 1) + '…';

                /* Protective dark mask shadow (not a glow) */
                ctx.save();
                ctx.shadowColor = '#0b0e14';
                ctx.shadowBlur = 4;
                ctx.fillStyle = hexToRGBA('#D6D1C4', Math.min(1, next));
                ctx.fillText(label, s.x + r + 6, s.y);
                ctx.restore();
            }
        }

        function blendWithConfidence(baseCol, conf) {
            var num = parseInt(baseCol.slice(1), 16);
            var r = num >> 16, g = (num >> 8) & 0xFF, b = num & 0xFF;
            var gray = 0.299 * r + 0.587 * g + 0.114 * b;
            var t = conf;
            r = Math.round(r * t + gray * (1 - t) * 0.5);
            g = Math.round(g * t + gray * (1 - t) * 0.5);
            b = Math.round(b * t + gray * (1 - t) * 0.5);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }

        function render() {
            requestAnimationFrame(render);
            draw();
        }

        /* ═══════ FILTERING ═══════ */
        function uFilt() {
            var vc = 0;
            nodes.forEach(function (n) {
                var inCat = catVisibility[n.category] !== false;
                var inTime = isFiniteNum(n.year) ? n.year >= tR.min && n.year <= tR.max : true;
                n.visible = inCat && inTime;
                if (n.visible) vc++;
            });
            gE.forEach(function (e) {
                var s = nM[e.source], t = nM[e.target];
                e.visible = s && t && s.visible && t.visible;
            });
            document.getElementById('time-visible-count').textContent = vc;
            /* Structure changed — recompute metrics, weights, silhouettes */
            computeMetrics();
            edgeWeights = null;
            silhouetteDirty = true;
        }

        /* ═══════ CATEGORY LEGEND ═══════ */
        function buildCategoryLegend() {
            var container = document.getElementById('category-legend');
            var html = '';
            Object.keys(_categoryColorCache).forEach(function (cat) {
                var col = getCategoryColor(cat);
                html += '<div class="cat-legend-item" data-category="' + cat + '">';
                html += '<div class="cat-legend-dot" style="background:' + col + '"></div>';
                html += '<span>' + cat + '</span>';
                html += '</div>';
            });
            container.innerHTML = html;

            container.querySelectorAll('.cat-legend-item').forEach(function (el) {
                el.addEventListener('click', function () {
                    var cat = el.dataset.category;
                    catVisibility[cat] = catVisibility[cat] === false ? true : false;
                    el.classList.toggle('dimmed', !catVisibility[cat]);
                    uFilt();
                });
            });
        }

        /* ═══════ DATA INITIALIZATION ═══════ */
        function initGraph(data) {
            nM = {}; nodes = []; gE = [];
            var minY = Infinity, maxY = -Infinity, degC = {};

            data.forEach(function (r) {
                if (!r.id) return;
                var id = r.id.replace(/\s+/g, '_');
                var yr = null;
                /* New schema: chronology.events[] (was historicalContext.chronology[]) */
                if (r.chronology && Array.isArray(r.chronology.events)) {
                    var years = r.chronology.events.map(function (c) { return c.year; }).filter(isFiniteNum);
                    if (years.length) yr = Math.min.apply(null, years);
                } else if (r.historicalContext && r.historicalContext.chronology) {
                    /* Backward-compat fallback for legacy data shape */
                    var yearsOld = r.historicalContext.chronology.map(function (c) { return c.year; }).filter(isFiniteNum);
                    if (yearsOld.length) yr = Math.min.apply(null, yearsOld);
                }
                if (yr !== null && yr < minY) minY = yr;
                if (yr !== null && yr > maxY) maxY = yr;

                var nd = {
                    id: id,
                    name: r.name || r.id,
                    category: r.category,
                    description: r.description || '',
                    confidence: ((r.metadata && r.metadata.confidenceScore) || 0.7),
                    degree: 0,
                    year: yr,
                    x: (Math.random() - .5) * 600,
                    y: (Math.random() - .5) * 600,
                    vx: 0, vy: 0,
                    visible: true,
                    pinned: false,
                    _raw: r
                };
                nodes.push(nd);
                nM[id] = nd;
                degC[id] = 0;
                catVisibility[r.category] = true;
                /* Assign a deterministic community color for this category */
                catColor(r.category);
            });

            data.forEach(function (r) {
                if (!r.relationships) return;
                r.relationships.forEach(function (rel) {
                    var sid = r.id.replace(/\s+/g, '_');
                    var tid = (rel.targetNodeId || '').replace(/\s+/g, '_');
                    if (!nM[sid] || !nM[tid]) return;
                    gE.push({
                        source: sid,
                        target: tid,
                        relType: rel.relationshipType,
                        visible: true
                    });
                    degC[sid] = (degC[sid] || 0) + 1;
                    degC[tid] = (degC[tid] || 0) + 1;
                });
            });

            nodes.forEach(function (n) { n.degree = degC[n.id] || 0; });

            tRF.min = minY === Infinity ? 0 : minY;
            tRF.max = maxY === -Infinity ? 2025 : maxY;
            tR.min = tRF.min;
            tR.max = tRF.max;

            document.getElementById('time-total-count').textContent = nodes.length;
            uTimeFill();
            buildCategoryLegend();
            uFilt();

            /* Settle the layout before fitting, then snap to the fit view */
            warmupLayout(300);
            sCV();
            fitCamera(true);
            dLoaded = true;
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        /* Warm up the force-directed layout synchronously so nodes settle. */
        function warmupLayout(iterations) {
            iterations = iterations || 300;
            alpha = 1;
            for (var i = 0; i < iterations; i++) simTick();
            alpha = 1; /* let the live loop cool it down again naturally */
            computeMetrics();
            computeEdgeWeights();
            silhouetteDirty = true;
        }

        /* ═══════ UI CONTROLS ═══════ */
        function uTimeFill() {
            var mn = parseInt(document.getElementById('time-min').value);
            var mx = parseInt(document.getElementById('time-max').value);
            if (mn > mx) { var tmp = mn; mn = mx; mx = tmp; }
            var range = tRF.max - tRF.min;
            if (range <= 0) range = 1;
            tR.min = tRF.min + mn / 1000 * range;
            tR.max = tRF.min + mx / 1000 * range;

            var fill = document.getElementById('time-fill');
            fill.style.left = (mn / 10) + '%';
            fill.style.width = ((mx - mn) / 10) + '%';
            document.getElementById('time-min-label').textContent = tR.min > 0 ? 'c. ' + Math.round(tR.min) : '—';
            document.getElementById('time-max-label').textContent = tR.max < Infinity ? 'c. ' + Math.round(tR.max) : '—';
        }

        function doSearch(q) {
            var dd = document.getElementById('search-dropdown');
            var inner = document.getElementById('search-dropdown-inner');
            var inp = document.getElementById('search-input');
            var r = inp.getBoundingClientRect();
            dd.style.top = (r.bottom + 4) + 'px';
            dd.style.left = r.left + 'px';
            dd.style.width = Math.max(320, r.width) + 'px';

            if (!q) { dd.classList.remove('open'); return; }
            var res = nodes.filter(function (n) {
                return n.name.toLowerCase().indexOf(q.toLowerCase()) >= 0 ||
                    n.category.toLowerCase().indexOf(q.toLowerCase()) >= 0;
            }).slice(0, 12);

            var html = '';
            res.forEach(function (nd) {
                var col = getCategoryColor(nd.category);
                html += '<div class="search-result" data-id="' + nd.id + '">';
                html += '<div class="sr-dot" style="background:' + col + '"></div>';
                html += '<div class="sr-body">';
                html += '<span class="sr-name">' + nd.name + '</span>';
                html += '<span class="sr-category">' + nd.category + '</span>';
                html += '</div></div>';
            });
            inner.innerHTML = html;
            dd.classList.add('open');

            inner.querySelectorAll('.search-result').forEach(function (el) {
                el.addEventListener('click', function () {
                    var id = el.dataset.id;
                    var nd = nM[id];
                    if (nd) {
                        pTN(nd);
                        selN = nd;
                        updateFocusIndicator();
                    }
                    dd.classList.remove('open');
                    document.getElementById('search-input').value = '';
                    document.getElementById('search-clear').classList.remove('visible');
                });
            });
        }

        /* ═══════ DETAIL PANEL — read-only renderer ═══════ */
        function escDP(s) {
            if (s === null || s === undefined) return '';
            /* Build entity strings via concatenation to survive any HTML entity decoding. */
            return String(s)
                .replace(/&/g, '&' + 'amp;')
                .replace(/</g, '&' + 'lt;')
                .replace(/>/g, '&' + 'gt;')
                .replace(/"/g, '&' + 'quot;')
                .replace(/'/g, '&' + '#39;');
        }

        /* Recursively render a specific-property value to HTML (objects/arrays/scalars). */
        function renderDPValue(v) {
            if (v === null || v === undefined) return '<span style="opacity:.5">—</span>';
            if (Array.isArray(v)) {
                if (!v.length) return '<span style="opacity:.5">—</span>';
                return '<ul>' + v.map(function (item) {
                    return '<li>' + renderDPValue(item) + '</li>';
                }).join('') + '</ul>';
            }
            if (typeof v === 'object') {
                return Object.keys(v).map(function (k) {
                    return '<div class="dp-kv"><div class="dp-kv-key">' + escDP(k) + '</div>' +
                        '<div class="dp-kv-val">' + renderDPValue(v[k]) + '</div></div>';
                }).join('');
            }
            if (typeof v === 'boolean') return v ? 'Yes' : 'No';
            if (typeof v === 'number') return escDP(v);
            return escDP(v);
        }

        function renderDetail(node) {
            if (!node) { renderDetailEmpty(); return; }
            var r = node._raw || {};
            var col = getCategoryColor(node.category);

            /* Header */
            document.getElementById('dp-cat-dot').style.background = col;
            document.getElementById('dp-category').textContent = node.category || 'Uncategorized';
            document.getElementById('dp-title').textContent = node.name || node.id;

            /* Meta badges */
            var metaHtml = '';
            var conf = ((r.metadata && r.metadata.confidenceScore) || node.confidence || 0.7);
            metaHtml += '<span class="dp-badge dp-conf"><span class="dp-badge-key">Conf</span><span class="dp-badge-val">' +
                Math.round(conf * 100) + '%</span></span>';
            if (r.layer) metaHtml += '<span class="dp-badge dp-layer"><span class="dp-badge-key">Layer</span><span class="dp-badge-val">' +
                escDP(r.layer) + '</span></span>';
            var deg = nodeDegrees[node.id] || node.degree || 0;
            metaHtml += '<span class="dp-badge"><span class="dp-badge-key">Links</span><span class="dp-badge-val">' + deg + '</span></span>';
            document.getElementById('dp-meta-row').innerHTML = metaHtml;

            /* Body — assemble sections */
            var html = '';

            /* Tags */
            if (r.tags && r.tags.length) {
                html += '<div class="dp-tags">' + r.tags.map(function (t) {
                    return '<span class="dp-tag">' + escDP(t) + '</span>';
                }).join('') + '</div>';
            }

            /* Description (short + long) */
            var hasDesc = r.description || r.longDescription;
            if (hasDesc) {
                html += '<div class="dp-section">';
                html += '<div class="dp-section-title">Description</div>';
                if (r.description) {
                    html += '<div class="dp-field"><div class="dp-field-value dp-prose">' + escDP(r.description) + '</div></div>';
                }
                if (r.longDescription) {
                    html += '<div class="dp-field"><span class="dp-field-label">Detailed</span>' +
                        '<div class="dp-field-value dp-prose">' + escDP(r.longDescription) + '</div></div>';
                }
                html += '</div>';
            }

            /* Chronology */
            var chrono = r.chronology;
            if (chrono && (chrono.summary || (chrono.events && chrono.events.length))) {
                html += '<div class="dp-section">';
                html += '<div class="dp-section-title">Chronology' +
                    (chrono.events && chrono.events.length ? ' <span class="dp-section-count">' + chrono.events.length + '</span>' : '') +
                    '</div>';
                if (chrono.summary) {
                    html += '<div class="dp-field"><div class="dp-field-value dp-prose">' + escDP(chrono.summary) + '</div></div>';
                }
                (chrono.events || []).forEach(function (ev) {
                    html += '<div class="dp-event">';
                    html += '<div class="dp-event-year">' + escDP(ev.year || '—') + '</div>';
                    if (ev.event) html += '<div class="dp-event-name">' + escDP(ev.event) + '</div>';
                    if (ev.context) html += '<div class="dp-event-context">' + escDP(ev.context) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            /* Specific properties */
            if (r.specific && Object.keys(r.specific).length) {
                html += '<div class="dp-section">';
                html += '<div class="dp-section-title">Specific Properties <span class="dp-section-count">' +
                    Object.keys(r.specific).length + '</span></div>';
                Object.keys(r.specific).forEach(function (k) {
                    html += '<div class="dp-kv"><div class="dp-kv-key">' + escDP(k) + '</div>' +
                        '<div class="dp-kv-val">' + renderDPValue(r.specific[k]) + '</div></div>';
                });
                html += '</div>';
            }

            /* Relationships */
            var rels = r.relationships || [];
            if (rels.length) {
                html += '<div class="dp-section">';
                html += '<div class="dp-section-title">Relationships <span class="dp-section-count">' + rels.length + '</span></div>';
                rels.forEach(function (rel) {
                    var tid = (rel.targetNodeId || '').replace(/\s+/g, '_');
                    var target = nM[tid];
                    var targetName = target ? (target.name || target.id) : (rel.targetNodeId || 'missing');
                    var missingClass = target ? '' : ' missing';
                    var relType = rel.relationshipType || 'related to';
                    html += '<div class="dp-rel" data-target="' + escDP(tid) + '"' + (target ? '' : ' data-missing="1"') + '>';
                    html += '<div class="dp-rel-row">';
                    html += '<span class="dp-rel-type">' + escDP(relType) + '</span>';
                    html += '<span class="dp-rel-arrow">→</span>';
                    html += '<span class="dp-rel-target' + missingClass + '">' + escDP(targetName) + '</span>';
                    html += '</div>';
                    if (rel.family) html += '<div class="dp-rel-family">' + escDP(rel.family) + '</div>';
                    if (rel.description) html += '<div class="dp-rel-desc">' + escDP(rel.description) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            /* Metadata */
            var md = r.metadata || {};
            if (Object.keys(md).length) {
                html += '<div class="dp-section">';
                html += '<div class="dp-section-title">Metadata</div>';
                html += '<div class="dp-meta-grid">';
                if (md.confidenceScore !== undefined) {
                    html += '<div class="dp-field"><span class="dp-field-label">Confidence</span>' +
                        '<div class="dp-field-value">' + escDP(md.confidenceScore) + '</div></div>';
                }
                if (md.sourceReference) {
                    html += '<div class="dp-field"><span class="dp-field-label">Source</span>' +
                        '<div class="dp-field-value">' + escDP(md.sourceReference) + '</div></div>';
                }
                if (md.createdDate) {
                    html += '<div class="dp-field"><span class="dp-field-label">Created</span>' +
                        '<div class="dp-field-value">' + escDP(md.createdDate) + '</div></div>';
                }
                if (md.inheritanceLevel !== undefined) {
                    html += '<div class="dp-field"><span class="dp-field-label">Inheritance</span>' +
                        '<div class="dp-field-value">' + escDP(md.inheritanceLevel) + '</div></div>';
                }
                html += '</div>';
                /* Audit trail */
                if (md.auditTrail && md.auditTrail.length) {
                    md.auditTrail.forEach(function (a) {
                        html += '<div class="dp-audit-entry">';
                        html += '<div class="dp-audit-date">' + escDP(a.date || a.timestamp || '—') + '</div>';
                        if (a.note || a.action) html += '<div class="dp-audit-note">' + escDP(a.note || a.action) + '</div>';
                        html += '</div>';
                    });
                }
                html += '</div>';
            }

            /* References */
            var refs = r.references || [];
            if (refs.length) {
                html += '<div class="dp-section">';
                html += '<div class="dp-section-title">References <span class="dp-section-count">' + refs.length + '</span></div>';
                refs.forEach(function (ref) {
                    html += '<div class="dp-ref">';
                    var title = ref.title || ref.url || 'Untitled';
                    if (ref.url) {
                        html += '<div class="dp-ref-title"><a href="' + escDP(ref.url) + '" target="_blank" rel="noopener">' + escDP(title) + '</a></div>';
                    } else {
                        html += '<div class="dp-ref-title">' + escDP(title) + '</div>';
                    }
                    if (ref.description) html += '<div class="dp-ref-desc">' + escDP(ref.description) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            /* Fallback if nothing rendered */
            if (!html) {
                html = '<div class="dp-empty"><div class="dp-empty-icon">&#9675;</div>' +
                    '<div class="dp-empty-text">No additional content recorded for this node.</div></div>';
            }

            document.getElementById('dp-body').innerHTML = html;

            /* Wire collapsible section toggles */
            document.querySelectorAll('.dp-section-title').forEach(function (t) {
                t.addEventListener('click', function () {
                    var section = t.parentElement;
                    if (section) section.classList.toggle('collapsed');
                });
            });

            /* Wire relationship navigation (skip missing targets) */
            document.querySelectorAll('.dp-rel').forEach(function (el) {
                if (el.dataset.missing === '1') return;
                el.addEventListener('click', function () {
                    var target = nM[el.dataset.target];
                    if (target) {
                        selN = target;
                        pTN(target);
                        updateFocusIndicator();
                    }
                });
            });
        }

        function renderDetailEmpty() {
            document.getElementById('dp-cat-dot').style.background = 'transparent';
            document.getElementById('dp-category').textContent = '';
            document.getElementById('dp-title').textContent = 'Select a node';
            document.getElementById('dp-meta-row').innerHTML = '';
            document.getElementById('dp-body').innerHTML =
                '<div class="dp-empty"><div class="dp-empty-icon">&#9675;</div>' +
                '<div class="dp-empty-text">Click a node in the graph to read its full content.</div></div>';
        }

        /* Focus state is implicit: the detail panel (aside) open/closed reflects selection.
           No explicit indicator or button — the aside IS the focus affordance. */
        function updateFocusIndicator() {
            if (selN) {
                /* Open the detail panel and render the selected node */
                document.body.classList.add('detail-open');
                renderDetail(selN);
                setTimeout(resize, 520);
            } else {
                /* Close the detail panel */
                document.body.classList.remove('detail-open');
                setTimeout(function () { if (!selN) renderDetailEmpty(); }, 420);
                setTimeout(resize, 520);
            }
        }

        function clearFocus() {
            selN = null;
            updateFocusIndicator();
        }

        /* ═══════ EVENT LISTENERS ═══════ */
        canvas.addEventListener('mousedown', function (e) {
            var r = canvas.getBoundingClientRect();
            var sx = e.clientX - r.left, sy = e.clientY - r.top;
            var nd = hitNode(sx, sy);
            if (nd) {
                dragN = nd;
                nd.pinned = true;
                canvas.classList.add('locked');
            } else {
                isPan = true;
                panS = { x: e.clientX - cam.x, y: e.clientY - cam.y };
                canvas.classList.add('locked');
            }
        });

        canvas.addEventListener('mousemove', function (e) {
            var r = canvas.getBoundingClientRect();
            var sx = e.clientX - r.left, sy = e.clientY - r.top;
            if (dragN) {
                var wp = s2w(sx, sy);
                dragN.x = wp.x;
                dragN.y = wp.y;
                dragN.vx = 0;
                dragN.vy = 0;
                silhouetteDirty = true;
                return;
            }
            if (isPan) {
                cam.x = e.clientX - panS.x;
                cam.y = e.clientY - panS.y;
                camTgt = null;
                return;
            }
            var nd = hitNode(sx, sy);
            if (nd !== hovN) {
                hovN = nd;
                if (nd) showTT(nd, sx, sy);
                else hideTT();
            } else if (nd) showTT(nd, sx, sy);
        });

        canvas.addEventListener('mouseup', function () {
            if (dragN) dragN.pinned = false;
            dragN = null;
            isPan = false;
            canvas.classList.remove('locked');
        });

        canvas.addEventListener('click', function (e) {
            var r = canvas.getBoundingClientRect();
            var sx = e.clientX - r.left, sy = e.clientY - r.top;
            var nd = hitNode(sx, sy);
            if (nd) {
                if (selN === nd) {
                    selN = null; /* Deselect */
                } else {
                    selN = nd; /* Select */
                }
                updateFocusIndicator();
            }
        });

        canvas.addEventListener('mouseleave', function () {
            hovN = null;
            hideTT();
            if (!dragN) {
                isPan = false;
                canvas.classList.remove('locked');
            }
        });

        canvas.addEventListener('wheel', function (e) {
            e.preventDefault();
            var r = canvas.getBoundingClientRect();
            var sx = e.clientX - r.left, sy = e.clientY - r.top;
            var wp = s2w(sx, sy);
            var f = e.deltaY > 0 ? 0.9 : 1.1;
            var nz = clamp(cam.z * f, 0.1, 5);
            cam.x = sx - wp.x * nz;
            cam.y = sy - wp.y * nz;
            cam.z = nz;
            camTgt = null;
        }, { passive: false });

        /* Double-click on empty canvas to fit the graph to view. */
        canvas.addEventListener('dblclick', function (e) {
            if (!dLoaded) return;
            var r = canvas.getBoundingClientRect();
            var sx = e.clientX - r.left, sy = e.clientY - r.top;
            if (hitNode(sx, sy)) return; /* ignore double-clicks landing on a node */
            fitCamera(false);
        });

        function hitNode(sx, sy) {
            var wp = s2w(sx, sy);
            var best = null, bestD = Infinity;
            nodes.forEach(function (n) {
                if (!n.visible) return;
                var dx = n.x - wp.x, dy = n.y - wp.y;
                var d2 = dx * dx + dy * dy;
                var r = nodeRadius(n) * 1.5; /* generous hit area */
                if (d2 < r * r && d2 < bestD) {
                    bestD = d2;
                    best = n;
                }
            });
            return best;
        }

        function showTT(nd, sx, sy) {
            var tt = document.getElementById('tooltip');
            var col = getCategoryColor(nd.category);
            document.getElementById('tt-cat-dot').style.background = col;
            document.getElementById('tt-category').textContent = nd.category;
            document.getElementById('tt-title').textContent = nd.name;
            document.getElementById('tt-desc').textContent = nd.description || 'No description available.';
            document.getElementById('tt-connections').textContent = (nodeDegrees[nd.id] || nd.degree || 0);
            document.getElementById('tt-confidence').textContent = Math.round((nd.confidence || 0.7) * 100) + '%';
            tt.style.display = 'block';
            var tx = sx + 18, ty = sy - 12;
            if (tx + 260 > W) tx = sx - 275;
            if (ty + 140 > H) ty = H - 150;
            tt.style.left = tx + 'px';
            tt.style.top = ty + 'px';
        }

        function hideTT() {
            document.getElementById('tooltip').style.display = 'none';
        }

        document.getElementById('sidebar-toggle-btn').addEventListener('click', function () {
            document.body.classList.toggle('sidebar-collapsed');
            setTimeout(resize, 550);
        });

        /* Fit-view button — animate the graph to frame all visible nodes. */
        document.getElementById('fit-view-btn').addEventListener('click', function () {
            if (!dLoaded) return;
            fitCamera(false);
        });

        /* Keyboard shortcut: F to fit view (ignored while typing in form fields). */
        document.addEventListener('keydown', function (e) {
            if (!dLoaded) return;
            if (e.key.toLowerCase() !== 'f') return;
            if (e.ctrlKey || e.metaKey || e.altKey) return; /* don't hijack Ctrl+F, etc. */
            var el = document.activeElement;
            if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return;
            e.preventDefault();
            fitCamera(false);
        });

        document.getElementById('time-min').addEventListener('input', function () {
            uTimeFill(); uFilt();
        });

        document.getElementById('time-max').addEventListener('input', function () {
            uTimeFill(); uFilt();
        });

        document.getElementById('search-input').addEventListener('input', function () {
            var q = this.value.trim();
            document.getElementById('search-clear').classList.toggle('visible', q.length > 0);
            doSearch(q);
        });

        document.getElementById('search-clear').addEventListener('click', function () {
            document.getElementById('search-input').value = '';
            this.classList.remove('visible');
            doSearch('');
        });

        /* Detail panel close button — same behavior as clearing focus */
        document.getElementById('dp-close').addEventListener('click', function () {
            clearFocus();
        });

        /* Lens toggles — silhouettes/weights must refresh on change */
        document.querySelectorAll('#lens-controls input').forEach(function (inp) {
            inp.addEventListener('change', function () {
                silhouetteDirty = true;
            });
        });

        /* ═══════ BOOT ═══════ */
        resize(); render(); window.addEventListener('resize', resize);

        var loaderMsg = document.getElementById('loader-msg');
        loaderMsg.textContent = 'Loading epistemic space';
        fetch('../data/index/data.json')
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (d) {
                loaderMsg.textContent = 'Building graph';
                var arr = Array.isArray(d) ? d : (d.nodes || d.categories || []);
                if (!arr.length) throw new Error('Empty dataset');
                setTimeout(function () { initGraph(arr); }, 50);
            })
            .catch(function (err) {
                loaderMsg.innerHTML = '<span style="color:#c47d8a">Failed to load data.<br>' + err.message + '</span>';
            });
    </script>
</body>
</html>
